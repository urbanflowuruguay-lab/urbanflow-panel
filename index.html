<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Empresa - UrbanFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }

        .header { background: #161b22; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-logo { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: #21262d; }
        .header h1 { font-size: 18px; color: #58a6ff; }
        .header .empresa-nombre { color: #8b949e; font-size: 13px; }
        .header .btn-logout { background: #da3633; color: white; padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .header .btn-logout:hover { opacity: 0.85; }

        .tabs { display: flex; gap: 0; background: #161b22; border-bottom: 1px solid #30363d; padding: 0 24px; overflow-x: auto; position: sticky; top: 65px; z-index: 99; }
        .tab { padding: 12px 18px; cursor: pointer; color: #8b949e; font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
        .tab:hover { color: #c9d1d9; }
        .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
        .tab .badge { background: #da3633; color: white; padding: 1px 7px; border-radius: 10px; font-size: 11px; margin-left: 6px; }

        .container { padding: 20px 24px; max-width: 960px; margin: 0 auto; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card h3 { color: #58a6ff; margin-bottom: 12px; font-size: 16px; }
        .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .form-row .form-group { flex: 1; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; color: #8b949e; font-size: 12px; margin-bottom: 4px; text-transform: uppercase; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #58a6ff; outline: none; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #1f6feb; color: white; }
        .btn-success { background: #238636; color: white; }
        .btn-danger { background: #da3633; color: white; }
        .btn-secondary { background: #30363d; color: #c9d1d9; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #0d1117; padding: 10px 12px; text-align: left; font-size: 12px; color: #8b949e; text-transform: uppercase; border-bottom: 1px solid #30363d; }
        td { padding: 10px 12px; border-bottom: 1px solid #21262d; font-size: 14px; }
        tr:hover { background: #0d1117; }
        .badge-status { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .badge-recibido { background: #1f6feb; color: #79c0ff; }
        .badge-preparando { background: #9e6a03; color: #f0e68c; }
        .badge-listo { background: #238636; color: #7ee787; }
        .badge-en_camino { background: #f0883e; color: #ffa657; }
        .badge-entregado { background: #238636; color: #7ee787; }
        .badge-cancelado { background: #da3633; color: #ffa198; }
        .badge-pendiente { background: #9e6a03; color: #f0e68c; }
        .badge-confirmada { background: #238636; color: #7ee787; }
        .badge-rechazada { background: #da3633; color: #ffa198; }
        .actions { display: flex; gap: 6px; }
        .empty { text-align: center; padding: 40px; color: #484f58; }
        .producto-img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; background: #21262d; }
        .pedido-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .pedido-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .pedido-id { font-weight: bold; color: #58a6ff; font-size: 15px; }
        .pedido-items { color: #8b949e; font-size: 13px; margin-bottom: 8px; }
        .pedido-total { font-weight: bold; color: #7ee787; font-size: 16px; }

        #loginSection { max-width: 400px; margin: 80px auto; }
        #loginSection h2 { color: #58a6ff; margin-bottom: 24px; text-align: center; }

        .toggle-activo { width: 40px; height: 22px; border-radius: 11px; border: none; cursor: pointer; position: relative; vertical-align: middle; }
        .toggle-activo.on { background: #238636; }
        .toggle-activo.off { background: #da3633; }
        .toggle-activo::after { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: white; top: 2px; transition: 0.2s; }
        .toggle-activo.on::after { left: 20px; }
        .toggle-activo.off::after { left: 2px; }
        .estado-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
        .estado-badge.on { color: #7ee787; }
        .estado-badge.off { color: #f85149; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 16px; text-align: center; }
        .stat-card .stat-num { font-size: 28px; font-weight: bold; color: #58a6ff; }
        .stat-card .stat-label { font-size: 12px; color: #8b949e; margin-top: 4px; text-transform: uppercase; }

        .upload-area { border: 2px dashed #30363d; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
        .upload-area:hover { border-color: #58a6ff; }
        .upload-area img { max-width: 200px; max-height: 120px; border-radius: 8px; object-fit: cover; margin-top: 8px; }
        .upload-area p { color: #8b949e; font-size: 13px; }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn { padding: 6px 14px; border: 1px solid #30363d; border-radius: 20px; background: transparent; color: #8b949e; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .filter-btn.active { background: #1f6feb; color: white; border-color: #1f6feb; }
        .filter-btn:hover { border-color: #58a6ff; color: #c9d1d9; }

        .mesa-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .mesa-info { display: flex; align-items: center; gap: 12px; }
        .mesa-num { font-size: 20px; font-weight: bold; color: #58a6ff; }
        .mesa-detalle { color: #8b949e; font-size: 13px; }
        .mesa-estado { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .estado-disponible { background: #238636; color: #7ee787; }
        .estado-ocupada { background: #da3633; color: #ffa198; }
        .estado-reservada { background: #9e6a03; color: #f0e68c; }

        .reserva-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
        .reserva-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .reserva-cliente { font-weight: bold; color: #c9d1d9; font-size: 15px; }
        .reserva-detalles { color: #8b949e; font-size: 13px; line-height: 1.8; }

        .test-summary { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
        .test-stat { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; text-align: center; }
        .test-stat .num { font-size: 24px; font-weight: 700; }
        .test-stat .label { font-size: 10px; color: #8b949e; text-transform: uppercase; }
        .test-stat.total .num { color: #c9d1d9; }
        .test-stat.ok .num { color: #7ee787; }
        .test-stat.fail .num { color: #f85149; }
        .test-stat.pend .num { color: #f0883e; }
        .test-stat.pct .num { color: #58a6ff; }
        .test-banner { display: none; text-align: center; padding: 24px; border-radius: 10px; margin-bottom: 16px; }
        .test-banner.show { display: block; }
        .test-banner.success { background: #23863622; border: 1px solid #238636; }
        .test-banner.success h3 { color: #7ee787; }
        .test-banner.warning { background: #f0883e22; border: 1px solid #f0883e; }
        .test-banner.warning h3 { color: #f0883e; }
        .test-section { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
        .test-section-header { padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #161b22; }
        .test-section-header h4 { font-size: 13px; color: #c9d1d9; }
        .test-section-header .tbadge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #21262d; color: #8b949e; }
        .test-section-body { padding: 0; }
        .test-section-body.hidden { display: none; }
        .test-row { display: flex; align-items: center; padding: 8px 14px; border-bottom: 1px solid #21262d; gap: 10px; }
        .test-row:last-child { border-bottom: none; }
        .test-row .t-num { width: 24px; font-size: 11px; color: #484f58; }
        .test-row .t-desc { flex: 1; font-size: 12px; color: #c9d1d9; }
        .test-row .t-obs { width: 120px; }
        .test-row .t-obs input { width: 100%; padding: 4px 6px; background: #161b22; border: 1px solid #30363d; border-radius: 4px; color: #c9d1d9; font-size: 11px; }
        .test-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: #238636; }
        .test-row .t-label { font-size: 11px; width: 50px; text-align: center; }
        .test-fail-list { background: #da363311; border: 1px solid #da363344; border-radius: 8px; padding: 14px; margin-top: 16px; }
        .test-fail-list h4 { color: #f85149; font-size: 13px; margin-bottom: 8px; }
        .test-fail-item { padding: 6px 0; border-bottom: 1px solid #da363322; font-size: 12px; color: #c9d1d9; }
        .test-fail-item:last-child { border-bottom: none; }
        .test-fail-sec { background: #da363333; color: #f85149; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-right: 6px; }
        .test-toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .test-toolbar button { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .test-saved { font-size: 10px; color: #484f58; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginSection" class="container">
    <h2>Panel de Empresa</h2>
    <div class="card">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="tu@email.com">
        </div>
        <div class="form-group">
            <label>Contrasena</label>
            <input type="password" id="loginPassword" placeholder="Tu contrasena">
        </div>
        <button class="btn btn-primary" style="width:100%;padding:12px" onclick="login()">Iniciar Sesion</button>
        <p id="loginError" style="color:#da3633;text-align:center;margin-top:12px;display:none"></p>
    </div>
    <button class="btn" style="width:100%;margin-top:12px;background:#f0883e22;color:#f0883e;border:1px solid #f0883e44;padding:12px;font-size:14px" onclick="showTesting()">🧪 Testing del Sistema</button>
</div>

<!-- TESTING SECTION -->
<div id="testingSection" style="display:none">
    <div class="header">
        <div class="header-left">
            <div>
                <h1 style="color:#f0883e">🧪 Testing del Sistema</h1>
                <span class="empresa-nombre">UrbanFlow - Checklist de pruebas</span>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
            <button class="btn" style="background:#30363d;color:#c9d1d9;border:1px solid #484f58;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px" onclick="hideTesting()">← Volver al Login</button>
        </div>
    </div>
    <div class="container" id="testingContent"></div>
</div>

<!-- PANEL -->
<div id="panelSection" style="display:none">
    <div class="header">
        <div class="header-left">
            <img id="headerLogo" class="header-logo" src="" style="display:none">
            <div>
                <h1>UrbanFlow</h1>
                <span class="empresa-nombre" id="empresaNombre"></span>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
            <span id="userEmail" style="color:#8b949e;font-size:12px"></span>
            <button class="btn-logout" onclick="logout()">Cerrar Sesion</button>
        </div>
    </div>

    <div class="tabs" id="tabsBar">
        <div class="tab active" id="tab_dashboard" onclick="switchTab('dashboard')">Inicio</div>
        <div class="tab" id="tab_pedidos" onclick="switchTab('pedidos')">Pedidos <span class="badge" id="badge_pedidos" style="display:none">0</span></div>
        <div class="tab" id="tab_reservas" onclick="switchTab('reservas')" style="display:none">Reservas <span class="badge" id="badge_reservas" style="display:none">0</span></div>
        <div class="tab" id="tab_mesas" onclick="switchTab('mesas')" style="display:none">Mesas</div>
        <div class="tab" id="tab_productos" onclick="switchTab('productos')">Carta</div>
        <div class="tab" id="tab_usuarios" onclick="switchTab('usuarios')">Usuarios</div>
        <div class="tab" id="tab_personal" onclick="switchTab('personal')">Control Personal</div>
        <div class="tab" id="tab_perfil" onclick="switchTab('perfil')">Perfil</div>
        <div class="tab" id="tab_testing" onclick="switchTab('testing')" style="background:#f0883e22;color:#f0883e">🧪 Testing</div>
    </div>

    <div class="container" id="content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://eyfgkopaamnkprzpwocz.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5Zmdrb3BhYW1ua3ByenB3b2N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTk0ODMsImV4cCI6MjA5NDE5NTQ4M30.bXkq4Ks3p2yb2SQH76__8jXhmM5Thi2izIL5UPkKa0I";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let empresaId = "";
let empresaData = null;
let currentTab = "dashboard";
let pedidoFilter = "todos";
let reservaFilter = "todas";

function compressImage(file, maxWidth, quality) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement("canvas");
                let w = img.width, h = img.height;
                if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
                canvas.width = w;
                canvas.height = h;
                canvas.getContext("2d").drawImage(img, 0, 0, w, h);
                canvas.toBlob(function(blob) {
                    resolve(new File([blob], file.name, { type: "image/jpeg" }));
                }, "image/jpeg", quality);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

async function login() {
    const email = document.getElementById("loginEmail").value.trim();
    const pass = document.getElementById("loginPassword").value.trim();
    if (!email || !pass) { showLoginError("Completa email y contrasena"); return; }

    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { showLoginError("Email o contrasena incorrectos"); return; }

    const userId = data.user.id;
    const { data: empresas } = await sb.from("empresas").select("*").eq("usuario_id", userId).eq("status", "aprobado");
    if (!empresas || empresas.length === 0) { showLoginError("No se encontro empresa aprobada"); return; }

    empresaId = empresas[0].id;
    empresaData = empresas[0];

    document.getElementById("empresaNombre").textContent = empresaData.nombre;
    document.getElementById("userEmail").textContent = data.user.email;

    if (empresaData.logo_url) {
        const logo = document.getElementById("headerLogo");
        logo.src = empresaData.logo_url;
        logo.style.display = "block";
        applyLogoForma(empresaData.logo_forma || "redondo");
    }

    if (empresaData.rubro_tipo === "comida") {
        document.getElementById("tab_reservas").style.display = "";
        document.getElementById("tab_mesas").style.display = "";
    }

    document.getElementById("loginSection").style.display = "none";
    document.getElementById("panelSection").style.display = "block";
    switchTab("dashboard");
}

function showLoginError(msg) {
    const el = document.getElementById("loginError");
    el.textContent = msg;
    el.style.display = "block";
}

function logout() {
    sb.auth.signOut();
    empresaId = "";
    empresaData = null;
    document.getElementById("panelSection").style.display = "none";
    document.getElementById("loginSection").style.display = "block";
}

function showTesting() {
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("testingSection").style.display = "block";
    loadTestingIn("testingContent");
}

function hideTesting() {
    document.getElementById("testingSection").style.display = "none";
    document.getElementById("loginSection").style.display = "block";
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.getElementById("tab_" + tab).classList.add("active");
    if (tab === "dashboard") loadDashboard();
    else if (tab === "pedidos") loadPedidos();
    else if (tab === "reservas") loadReservas();
    else if (tab === "mesas") loadMesas();
    else if (tab === "productos") loadProductos();
    else if (tab === "usuarios") loadUsuarios();
    else if (tab === "personal") loadPersonal();
    else if (tab === "perfil") loadPerfil();
    else if (tab === "testing") loadTesting();
}

function refreshBadges() {
    sb.from("pedidos").select("id,estado").eq("empresa_id", empresaId).then(({ data }) => {
        const nuevos = (data || []).filter(p => p.estado === "recibido").length;
        const badge = document.getElementById("badge_pedidos");
        badge.textContent = nuevos;
        badge.style.display = nuevos > 0 ? "inline" : "none";
    });
    if (empresaData?.rubro_tipo === "comida") {
        sb.from("reservas").select("id,estado").eq("empresa_id", empresaId).eq("estado", "pendiente").then(({ data }) => {
            const badge = document.getElementById("badge_reservas");
            badge.textContent = (data || []).length;
            badge.style.display = data && data.length > 0 ? "inline" : "none";
        });
    }
}

async function loadDashboard() {
    const content = document.getElementById("content");
    content.innerHTML = '<div class="empty">Cargando...</div>';

    const [pedidosRes, productosRes] = await Promise.all([
        sb.from("pedidos").select("id,estado,total").eq("empresa_id", empresaId),
        sb.from("productos_empresa").select("id,activo").eq("empresa_id", empresaId)
    ]);

    const pedidos = pedidosRes.data || [];
    const productos = productosRes.data || [];
    const recibidos = pedidos.filter(p => p.estado === "recibido").length;
    const preparando = pedidos.filter(p => p.estado === "preparando").length;
    const listos = pedidos.filter(p => p.estado === "listo").length;
    const totalVentas = pedidos.filter(p => p.estado !== "cancelado").reduce((s, p) => s + (p.total || 0), 0);
    const productosActivos = productos.filter(p => p.activo).length;

    let reservasHoy = 0;
    let mesasDisp = 0;
    if (empresaData?.rubro_tipo === "comida") {
        const hoy = new Date().toISOString().split("T")[0];
        const [resRes, mesasRes] = await Promise.all([
            sb.from("reservas").select("id").eq("empresa_id", empresaId).eq("fecha", hoy).not("estado", "eq", "cancelada"),
            sb.from("mesas").select("id,estado").eq("empresa_id", empresaId)
        ]);
        reservasHoy = (resRes.data || []).length;
        mesasDisp = (mesasRes.data || []).filter(m => m.estado === "disponible").length;
    }

    content.innerHTML = `
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-num" style="color:#f0e68c">${recibidos}</div><div class="stat-label">Nuevos pedidos</div></div>
            <div class="stat-card"><div class="stat-num" style="color:#f0e68c">${preparando}</div><div class="stat-label">En preparacion</div></div>
            <div class="stat-card"><div class="stat-num" style="color:#7ee787">${listos}</div><div class="stat-label">Listos para entregar</div></div>
            <div class="stat-card"><div class="stat-num" style="color:#7ee787">$${totalVentas.toFixed(0)}</div><div class="stat-label">Ventas totales</div></div>
            <div class="stat-card"><div class="stat-num">${productosActivos}</div><div class="stat-label">Productos activos</div></div>
            ${empresaData?.rubro_tipo === "comida" ? `
            <div class="stat-card"><div class="stat-num" style="color:#f0e68c">${reservasHoy}</div><div class="stat-label">Reservas hoy</div></div>
            <div class="stat-card"><div class="stat-num" style="color:#7ee787">${mesasDisp}</div><div class="stat-label">Mesas libres</div></div>
            ` : ""}
        </div>
        ${recibidos > 0 ? `<div class="card" style="border-color:#f0e68c">
            <h3 style="color:#f0e68c">Tenes ${recibidos} pedido(s) nuevo(s) esperando</h3>
            <p style="color:#8b949e;margin-bottom:12px">Anda a la pestana "Pedidos" para aceptarlos o rechazarlos.</p>

async function loadPedidos() {
    const { data: pedidos } = await sb.from("pedidos").select("*").eq("empresa_id", empresaId).order("created_at", { ascending: false });
    refreshBadges();

    const content = document.getElementById("content");
    const filters = ["todos", "recibido", "preparando", "listo", "en_camino", "entregado", "cancelado"];

    let html = `<div class="filter-bar">
        ${filters.map(f => `<button class="filter-btn ${pedidoFilter === f ? 'active' : ''}" onclick="pedidoFilter='${f}';loadPedidos()">${f === "todos" ? "Todos" : f.charAt(0).toUpperCase() + f.slice(1)}</button>`).join("")}
    </div>`;

    let filtered = pedidos || [];
    if (pedidoFilter !== "todos") filtered = filtered.filter(p => p.estado === pedidoFilter);

    if (filtered.length === 0) {
        html += '<div class="empty"><p>Sin pedidos</p></div>';
        content.innerHTML = html;
        return;
    }

    const colores = { recibido: "badge-recibido", preparando: "badge-preparando", listo: "badge-listo", en_camino: "badge-en_camino", entregado: "badge-entregado", cancelado: "badge-cancelado" };

    html += filtered.map(p => {
        const fecha = p.created_at ? new Date(p.created_at).toLocaleString("es-UY") : "";
        const shortId = p.id.substring(0, 8).toUpperCase();
        let items = [];
        try { items = typeof p.items === "string" ? JSON.parse(p.items) : (p.items || []); } catch(e) {}
        const itemsHtml = items.map(i => `${i.cantidad || 1}x ${i.nombre || i}`).join(", ");
        let acciones = "";
        if (p.estado === "recibido") {
            acciones = `<button class="btn btn-primary btn-sm" onclick="updatePedido('${p.id}','preparando')">Preparar</button>
                        <button class="btn btn-danger btn-sm" onclick="updatePedido('${p.id}','cancelado')">Cancelar</button>`;
        } else if (p.estado === "preparando") {
            acciones = `<button class="btn btn-success btn-sm" onclick="updatePedido('${p.id}','listo')">Listo</button>
                        <button class="btn btn-danger btn-sm" onclick="updatePedido('${p.id}','cancelado')">Cancelar</button>`;
        } else if (p.estado === "listo") {
            if (p.tipo_entrega === "Mesa") {
                acciones = `<button class="btn btn-success btn-sm" onclick="asignarCamarero('${p.id}')">🍽️ Asignar camarero</button>`;
            } else if (p.tipo_entrega === "Delivery" || p.tipo_entrega === "Domicilio") {
                acciones = `<button class="btn btn-primary btn-sm" onclick="asignarDelivery('${p.id}')">🚴 Asignar Delivery</button>`;
            } else {
                acciones = `<button class="btn btn-success btn-sm" onclick="updatePedido('${p.id}','entregado')">✅ Entregado</button>`;
            }
        }
        const deliveryInfo = p.delivery_nombre ? `<div style="color:#58a6ff;font-size:12px;margin-top:4px">🚴 ${p.delivery_nombre}</div>` : "";
        const camareroInfo = p.worker_nombre && p.tipo_entrega === "Mesa" ? `<div style="color:#7ee787;font-size:12px;margin-top:4px">🍽️ ${p.worker_nombre}</div>` : "";
        const secretaInfo = p.palabra_secreta ? `<div style="color:#f0883e;font-size:12px;margin-top:4px">🔑 Secreto: <strong>${p.palabra_secreta}</strong></div>` : "";
        return `<div class="pedido-card">
            <div class="pedido-header">
                <span class="pedido-id">#${shortId}</span>
                <span class="badge-status ${colores[p.estado] || ''}">${p.estado.toUpperCase()}</span>
            </div>
            <div class="pedido-items" style="font-size:13px;color:#8b949e">${itemsHtml}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
                <span class="pedido-total">$${(p.total || 0).toFixed(0)}</span>
                <div class="actions">${acciones}</div>
            </div>
            ${deliveryInfo}${camareroInfo}${secretaInfo}
            <div style="color:#484f58;font-size:11px;margin-top:4px">${p.notas || ""} | ${p.tipo_entrega || "Retiro"} | ${fecha}</div>
        </div>`;
    }).join("");

    content.innerHTML = html;
}

async function loadMesas() {
    const { data: mesas } = await sb.from("mesas").select("*").eq("empresa_id", empresaId).order("numero", { ascending: true });
    const content = document.getElementById("content");

    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="color:#58a6ff;margin:0">Mesas</h3>
        <button class="btn btn-primary" onclick="showMesaDialog()">+ Agregar Mesa</button>
    </div>`;

    if (!mesas || mesas.length === 0) {
        html += '<div class="empty"><p>Sin mesas configuradas. Agrega una para empezar.</p></div>';
        content.innerHTML = html;
        return;
    }

    const estados = { disponible: "estado-disponible", ocupada: "estado-ocupada", reservada: "estado-reservada" };

    html += mesas.map(m => {
        const panelBase = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        const qrUrl = m.mesa_token ? `${panelBase}mesa.html?mesa=${m.mesa_token}&empresa=${empresaId}` : "";
        return `<div class="mesa-card">
        <div class="mesa-info">
            <span class="mesa-num">#${m.numero}</span>
            <span class="mesa-detalle">${m.capacidad} personas ${m.descripcion ? "| " + m.descripcion : ""}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
            <span class="mesa-estado ${estados[m.estado] || ''}">${m.estado}</span>
            ${qrUrl ? `<button class="btn btn-primary btn-sm" onclick="showQR('${qrUrl}',${m.numero})" style="background:#238636">Ver QR</button>` : ""}
            <button class="btn btn-secondary btn-sm" onclick="editMesa('${m.id}',${m.numero},${m.capacidad},'${(m.descripcion||'').replace(/'/g,"\\'")}','${m.estado}')">Editar</button>
            <button class="btn btn-danger btn-sm" onclick="deleteMesa('${m.id}',${m.numero})">Borrar</button>
        </div>
    </div>`}).join("");

    content.innerHTML = html;
}

function showMesaDialog(id, numero, capacidad, desc, estado) {

        <h3>${isNew ? "Nueva Mesa" : "Editar Mesa #" + numero}</h3>
        <input type="hidden" id="mesaId" value="${id || ''}">

            <div class="form-group"><label>Numero</label><input type="number" id="mesaNumero" value="${numero || ''}"></div>
            <div class="form-group"><label>Capacidad</label><input type="number" id="mesaCapacidad" value="${capacidad || 4}"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Descripcion</label><input type="text" id="mesaDesc" value="${desc || ''}" placeholder=" Ej: Ventana, terraza"></div>
            <div class="form-group"><label>Estado</label>
                <select id="mesaEstado">
                    <option value="disponible" ${estado === "disponible" ? "selected" : ""}>Disponible</option>
                    <option value="ocupada" ${estado === "ocupada" ? "selected" : ""}>Ocupada</option>
                    <option value="reservada" ${estado === "reservada" ? "selected" : ""}>Reservada</option>
                </select>
            </div>
        </div>
        <div style="display:flex;gap:8px">
            <button class="btn btn-success" onclick="saveMesa()">Guardar</button>
            <button class="btn btn-secondary" onclick="loadMesas()">Cancelar</button>
        </div>
    </div>`;

    const content = document.getElementById("content");
    const formSlot = document.getElementById("mesaForm");
    if (formSlot) formSlot.remove();
    content.insertAdjacentHTML("afterbegin", html);
}

function showQR(url, numero) {
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer";
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

    const title = document.createElement("h2");
    title.textContent = `Mesa #${numero}`;
    title.style.cssText = "color:#58a6ff;margin-bottom:16px;font-size:24px";
    overlay.appendChild(title);

    const qrContainer = document.createElement("div");
    qrContainer.style.cssText = "background:white;padding:24px;border-radius:12px;text-align:center";
    overlay.appendChild(qrContainer);

    const qrImg = document.createElement("img");
    qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(url)}`;
    qrImg.style.cssText = "width:280px;height:280px;display:block";
    qrImg.onload = () => {
        const label = document.createElement("div");
        label.textContent = `MESA #${numero}`;
        label.style.cssText = "color:#1f6feb;font-size:20px;font-weight:bold;margin-top:8px;font-family:'Segoe UI',sans-serif";
        qrContainer.appendChild(label);
    };
    qrContainer.appendChild(qrImg);

    const link = document.createElement("p");
    link.textContent = url;
    link.style.cssText = "color:#8b949e;font-size:10px;margin-top:12px;word-break:break-all;max-width:400px;text-align:center";
    overlay.appendChild(link);

    const btnRow = document.createElement("div");
    btnRow.style.cssText = "display:flex;gap:8px;margin-top:16px";

    const printBtn = document.createElement("button");
    printBtn.textContent = "Imprimir";
    printBtn.style.cssText = "background:#1f6feb;color:white;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-size:14px;font-weight:600";
    printBtn.onclick = (e) => {
        e.stopPropagation();
        const printWin = window.open("", "_blank");
        printWin.document.write(`<html><head><title>Mesa ${numero}</title><style>@media print{img{max-width:100%}}body{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;margin:0;font-family:sans-serif}h1{margin-bottom:16px}</style></head><body><h1>Mesa #${numero}</h1><img src="${qrImg.src}" style="max-width:400px"></body></html>`);
        printWin.document.close();
        setTimeout(() => printWin.print(), 500);
    };
    btnRow.appendChild(printBtn);

    const verBtn = document.createElement("button");
    verBtn.textContent = "Ver carta";
    verBtn.style.cssText = "background:#238636;color:white;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-size:14px;font-weight:600";
    verBtn.onclick = (e) => {
        e.stopPropagation();
        window.open(url, "_blank");
    };
    btnRow.appendChild(verBtn);

    overlay.appendChild(btnRow);

    const hint = document.createElement("p");
    hint.textContent = "Toca fuera para cerrar";
    hint.style.cssText = "color:#484f58;font-size:12px;margin-top:12px";
    overlay.appendChild(hint);

    document.body.appendChild(overlay);
}

function editMesa(id, numero, capacidad, desc, estado) {

async function saveMesa() {
    const id = document.getElementById("mesaId").value;
    const data = {
        empresa_id: empresaId,
        numero: parseInt(document.getElementById("mesaNumero").value),
        capacidad: parseInt(document.getElementById("mesaCapacidad").value) || 4,
        descripcion: document.getElementById("mesaDesc").value.trim(),
        estado: document.getElementById("mesaEstado").value
    };
    if (!data.numero) { alert("Numero es obligatorio"); return; }

    if (id) {
        await sb.from("mesas").update({ numero: data.numero, capacidad: data.capacidad, descripcion: data.descripcion, estado: data.estado }).eq("id", id);
    } else {
        data.mesa_token = crypto.randomUUID();
        data.qr_code = crypto.randomUUID();
        await sb.from("mesas").insert(data);
    }
    loadMesas();
}

async function deleteMesa(id, numero) {

    await sb.from("mesas").delete().eq("id", id);
    loadMesas();
}

            <button class="btn btn-secondary" onclick="cancelProducto()">Cancelar</button>

        <tbody id="productosTable"></tbody>
    </table>`;

    content.innerHTML = html;

    document.getElementById("prodFotoFile").addEventListener("change", async function() {
        const file = this.files[0];
        if (!file) return;
        document.getElementById("prodFotoPreview").src = URL.createObjectURL(file);
        document.getElementById("prodFotoPreview").style.display = "block";
        const compressed = await compressImage(file, 800, 0.7);
        const path = `empresa_${empresaId}/productos_${Date.now()}.jpg`;
        const { data, error } = await sb.storage.from("ocio_fotos").upload(path, compressed, { upsert: true });
        if (!error) {
            const { data: urlData } = sb.storage.from("ocio_fotos").getPublicUrl(path);
            document.getElementById("prodFoto").value = urlData.publicUrl;
        }
    });

    const tbody = document.getElementById("productosTable");
    if (!productos || productos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty">Sin productos</td></tr>';
        return;
    }

    tbody.innerHTML = productos.map(p => {
        let cats = p.categorias || p.categoria || [];
        if (typeof cats === 'string') try { cats = JSON.parse(cats); } catch { cats = [cats]; }
        const catsLabel = Array.isArray(cats) ? cats.join(', ') : cats;
        return `<tr>
        <td>${p.foto_url ? `<img src="${p.foto_url}" class="producto-img">` : '<div class="producto-img" style="display:flex;align-items:center;justify-content:center;color:#484f58">?</div>'}</td>
        <td><strong>${p.nombre}</strong></td>
        <td><small style="color:#8b949e">${catsLabel}</small></td>
        <td>$${(p.precio || 0).toFixed(0)}</td>
        <td><span class="estado-badge ${p.activo ? 'on' : 'off'}"><button class="toggle-activo ${p.activo ? 'on' : 'off'}" onclick="toggleProducto('${p.id}',${p.activo})"></button>${p.activo ? 'Activo' : 'Inactivo'}</span></td>
        <td class="actions">
            <button class="btn btn-secondary btn-sm" onclick="editProducto('${p.id}','${(p.nombre||'').replace(/'/g,"\\'")}','${p.precio||0}','${(p.descripcion||'').replace(/'/g,"\\'")}','${JSON.stringify(cats).replace(/'/g,"\\'").replace(/"/g,"&quot;")}','${p.foto_url||''}')">Editar</button>
            <button class="btn btn-danger btn-sm" onclick="deleteProducto('${p.id}','${(p.nombre||'').replace(/'/g,"\\'")}')">Borrar</button>
        </td>
    </tr>`}).join("");
}

async function saveProducto() {
    console.log("=== saveProducto INICIO ===");
    const id = document.getElementById("prodId").value;
    const nombre = document.getElementById("prodNombre").value.trim();
    const precio = document.getElementById("prodPrecio").value;
    const cat1 = document.getElementById("prodCategoria").value.trim();
    console.log("id:", id, "nombre:", nombre, "precio:", precio, "cat1:", cat1, "empresaId:", empresaId);
    if (!nombre) { alert("Nombre es obligatorio"); return; }
    if (!cat1) { alert("Ingresa una categoria"); return; }
    const cats = [cat1];
    if (document.getElementById("prodOtraCat").checked) {
        const cat2 = document.getElementById("prodCategoria2").value.trim();
        if (cat2 && cat2 !== cat1) cats.push(cat2);
    }
    const data = {
        empresa_id: empresaId,
        nombre: nombre,
        precio: parseFloat(precio) || 0,
        categorias: cats,
        descripcion: document.getElementById("prodDescripcion").value.trim(),
        foto_url: document.getElementById("prodFoto").value.trim(),
        activo: true
    };
    console.log("Data a guardar:", JSON.stringify(data));

    for (const catName of cats) {
        const exists = categoriasEmpresa.find(c => c.nombre === catName);
        if (!exists) {
            console.log("Creando categoria:", catName);
            const { error: catErr } = await sb.from("categorias_empresa").insert({ empresa_id: empresaId, nombre: catName, icono: "📌", subcategorias: [] });
            if (catErr) console.error("Error creando categoria:", catErr);
        }
    }

    let result;
    if (id) {
        result = await sb.from("productos_empresa").update(data).eq("id", id);
    } else {
        result = await sb.from("productos_empresa").insert(data);
    }

    if (result.error) {
        console.error("Error guardando producto:", result.error);
        alert("Error: " + result.error.message);
        return;
    }

    console.log("Producto guardado OK:", result.data);
    alert("Producto guardado");
    cancelProducto();
    loadProductos();
}

async function toggleProducto(id, currentActivo) {
    await sb.from("productos_empresa").update({ activo: !currentActivo }).eq("id", id);
    loadProductos();
}

async function deleteProducto(id, nombre) {
    if (!confirm(`Eliminar "${nombre}"?`)) return;
    await sb.from("productos_empresa").delete().eq("id", id);
    loadProductos();
}

async function loadPersonal() {
    const [pedRes, usrRes] = await Promise.all([
        sb.from("pedidos").select("*").eq("empresa_id", empresaId).order("created_at", { ascending: false }).limit(200),
        sb.from("usuarios_empresa").select("*").eq("empresa_id", empresaId).eq("activo", true)
    ]);
    const pedidos = pedRes.data || [];
    const usuarios = usrRes.data || [];
    const content = document.getElementById("content");

    const workerStats = {};
    usuarios.forEach(u => {
        workerStats[u.id] = { nombre: u.nombre, rol: u.rol, pedidos: 0, tiempos: [] };
    });

    pedidos.forEach(p => {
        if (p.worker_id && workerStats[p.worker_id]) {
            workerStats[p.worker_id].pedidos++;
            if (p.started_at && p.created_at) {
                const tPrep = (new Date(p.ready_at || Date.now()) - new Date(p.started_at)) / 60000;
                workerStats[p.worker_id].tiempos.push(tPrep);
            }
        }
    });

    let html = `<h3 style="color:#58a6ff;margin-bottom:16px">Control de Personal</h3>`;

    html += `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px">`;
    Object.values(workerStats).forEach(w => {
        const promedio = w.tiempos.length > 0 ? Math.round(w.tiempos.reduce((a,b) => a+b, 0) / w.tiempos.length) : 0;
        const color = w.rol === "cocina" ? "#1f6feb" : w.rol === "delivery" ? "#f0883e" : "#8b949e";
        html += `<div class="card" style="border-left:3px solid ${color}">
            <div style="font-weight:600;color:#c9d1d9">${w.nombre}</div>
            <div style="color:#8b949e;font-size:12px;text-transform:uppercase">${w.rol}</div>
            <div style="margin-top:8px;font-size:24px;font-weight:bold;color:#58a6ff">${w.pedidos}</div>
            <div style="color:#8b949e;font-size:11px">pedidos hoy</div>
            ${promedio > 0 ? `<div style="color:#7ee787;font-size:13px;margin-top:4px">⏱ ${promedio} min promedio</div>` : ""}
        </div>`;
    });
    html += `</div>`;

    html += `<h3 style="color:#58a6ff;margin-bottom:12px">Ultimos pedidos</h3>`;
    const recientes = pedidos.slice(0, 50);
    if (recientes.length === 0) {
        html += '<div class="empty"><p>Sin pedidos</p></div>';
        content.innerHTML = html;
        return;
    }

    html += `<table><thead><tr><th>#</th><th>Trabajador</th><th>Rol</th><th>Recibido</th><th>Inicio</th><th>Listo</th><th>Entregado</th><th>Tiempo</th></tr></thead><tbody>`;
    recientes.forEach(p => {
        const worker = p.worker_nombre || "—";
        const rol = p.worker_id ? (workerStats[p.worker_id]?.rol || "—") : "—";
        const t0 = p.created_at ? new Date(p.created_at).toLocaleTimeString("es-UY", {hour:"2-digit",minute:"2-digit"}) : "—";
        const t1 = p.started_at ? new Date(p.started_at).toLocaleTimeString("es-UY", {hour:"2-digit",minute:"2-digit"}) : "—";
        const t2 = p.ready_at ? new Date(p.ready_at).toLocaleTimeString("es-UY", {hour:"2-digit",minute:"2-digit"}) : "—";
        const t3 = p.delivered_at ? new Date(p.delivered_at).toLocaleTimeString("es-UY", {hour:"2-digit",minute:"2-digit"}) : "—";
        let tiempoTotal = "—";
        if (p.created_at && (p.delivered_at || p.ready_at)) {
            const fin = p.delivered_at || p.ready_at;
            tiempoTotal = Math.round((new Date(fin) - new Date(p.created_at)) / 60000) + " min";
        }
        html += `<tr>
            <td style="color:#58a6ff">#${p.id.substring(0,6).toUpperCase()}</td>
            <td>${worker}</td>
            <td><span style="color:${rol==="cocina"?"#58a6ff":rol==="delivery"?"#f0883e":"#8b949e"}">${rol}</span></td>
            <td>${t0}</td><td>${t1}</td><td>${t2}</td><td>${t3}</td>
            <td style="color:#7ee787;font-weight:600">${tiempoTotal}</td>
        </tr>`;
    });
    html += `</tbody></table>`;

    content.innerHTML = html;
}

async function loadUsuarios() {
    const { data: usuarios } = await sb.from("usuarios_empresa").select("*").eq("empresa_id", empresaId).order("created_at", { ascending: false });
    const content = document.getElementById("content");

    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div>
            <h3 style="color:#58a6ff;margin:0">Trabajadores</h3>
            <p style="color:#8b949e;font-size:13px;margin-top:4px">Los trabajadores entran con su PIN, no con email</p>
        </div>
        <button class="btn btn-primary" onclick="showAddUsuario()">+ Agregar</button>
    </div>`;

    html += `<div id="formUsuario" style="display:none" class="card">
        <h3 id="formUsuarioTitle">Nuevo Trabajador</h3>
        <input type="hidden" id="usrId">
        <div class="form-row">
            <div class="form-group"><label>Nombre *</label><input type="text" id="usrNombre" placeholder="Juan Perez"></div>
            <div class="form-group"><label>PIN (4-6 digitos) *</label><input type="text" id="usrPin" maxlength="6" placeholder="1234" inputmode="numeric"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Rol</label>
                <select id="usrRol">${roles.map(r => `<option value="${r.value}">${r.label} - ${r.desc}</option>`).join("")}</select>
            </div>
        </div>
        <div style="display:flex;gap:8px">
            <button class="btn btn-success" onclick="saveUsuario()">Guardar</button>
            <button class="btn btn-secondary" onclick="cancelUsuario()">Cancelar</button>
        </div>
    </div>`;

    if (!usuarios || usuarios.length === 0) {
        html += '<div class="empty"><p>Sin trabajadores. Agregá uno para que pueda usar el panel en otra pantalla.</p></div>';
    } else {
        const rolLabels = {};
        roles.forEach(r => rolLabels[r.value] = r.label);
        html += `<table>
            <thead><tr><th>Nombre</th><th>PIN</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody>${usuarios.map(u => `<tr>
                <td><strong>${u.nombre}</strong></td>
                <td><code style="background:#21262d;padding:2px 8px;border-radius:4px">${u.pin}</code></td>
                <td>${rolLabels[u.rol] || u.rol}</td>
                <td><button class="toggle-activo ${u.activo ? 'on' : 'off'}" onclick="toggleUsuario('${u.id}',${u.activo})"></button></td>
                <td class="actions">
                    <button class="btn btn-secondary btn-sm" onclick="editUsuario('${u.id}','${u.nombre.replace(/'/g,"\\'")}','${u.pin}','${u.rol}')">Editar</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteUsuario('${u.id}','${u.nombre.replace(/'/g,"\\'")}')">Borrar</button>
                </td>
            </tr>`).join("")}</tbody>
        </table>`;

        html += `<div class="card" style="margin-top:16px;border-color:#1f6feb">
            <h3 style="color:#58a6ff">Abrir en otra pantalla</h3>
            <p style="color:#8b949e;font-size:13px;margin-bottom:12px">Copiá este link y abrilo en la tablet/PC de cocina, delivery, etc.</p>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button class="btn btn-success btn-sm" onclick="copyLink('hub')" style="background:#238636;font-size:14px;padding:10px 16px">📱 Link Hub (acceso directo)</button>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
                <button class="btn btn-primary btn-sm" onclick="copyLink('fichaje')">⏰ Fichaje</button>
                <button class="btn btn-primary btn-sm" onclick="copyLink('cocina')">👨‍🍳 Cocina</button>
                <button class="btn btn-success btn-sm" onclick="copyLink('camarero')">🍽️ Camarero</button>
                <button class="btn btn-primary btn-sm" onclick="copyLink('delivery')">🚴 Delivery</button>
                <button class="btn btn-warning btn-sm" onclick="copyLink('caja')">💰 Caja</button>
            </div>
        </div>`;
    }

    content.innerHTML = html;
}

function copyLink(seccion) {
    const base = window.location.origin + window.location.pathname.replace(/index\.html$/, "");
    const url = base + seccion + ".html?empresa=" + empresaId;
    navigator.clipboard.writeText(url).then(() => {
        alert("Link copiado:\n" + url);
    }).catch(() => {
        prompt("Copia este link:", url);
    });
}

function showAddUsuario() {
    document.getElementById("formUsuario").style.display = "block";
    document.getElementById("formUsuarioTitle").textContent = "Nuevo Trabajador";
    document.getElementById("usrId").value = "";
    document.getElementById("usrNombre").value = "";
    document.getElementById("usrPin").value = "";
    document.getElementById("usrRol").value = "cocina";
}

function editUsuario(id, nombre, pin, rol) {
    document.getElementById("formUsuario").style.display = "block";
    document.getElementById("formUsuarioTitle").textContent = "Editar Trabajador";
    document.getElementById("usrId").value = id;
    document.getElementById("usrNombre").value = nombre;
    document.getElementById("usrPin").value = pin;
    document.getElementById("usrRol").value = rol;
}

function cancelUsuario() { document.getElementById("formUsuario").style.display = "none"; }

async function saveUsuario() {
    const id = document.getElementById("usrId").value;
    const nombre = document.getElementById("usrNombre").value.trim();
    const pin = document.getElementById("usrPin").value.trim();
    const rol = document.getElementById("usrRol").value;
    if (!nombre || !pin) { alert("Nombre y PIN son obligatorios"); return; }
    if (pin.length < 4) { alert("El PIN debe tener al menos 4 digitos"); return; }

    if (id) {
        await sb.from("usuarios_empresa").update({ nombre, pin, rol }).eq("id", id);
    } else {
        await sb.from("usuarios_empresa").insert({ empresa_id: empresaId, nombre, pin, rol, activo: true });
    }
    cancelUsuario();
    loadUsuarios();
}

async function toggleUsuario(id, currentActivo) {
    await sb.from("usuarios_empresa").update({ activo: !currentActivo }).eq("id", id);
    loadUsuarios();
}

async function deleteUsuario(id, nombre) {
    if (!confirm(`Eliminar a "${nombre}"?`)) return;
    await sb.from("usuarios_empresa").delete().eq("id", id);
    loadUsuarios();
}

function loadTestingIn(containerId) {
    const c = document.getElementById(containerId);
    if (!c) return;
    const saved = JSON.parse(localStorage.getItem(TEST_KEY) || "{}");
    let html = '<div class="test-summary" id="testSummary"></div>';
    html += '<div class="test-banner" id="testBanner"></div>';
    html += '<div class="test-toolbar">';
    html += '<button class="btn btn-danger" onclick="resetTesting()">🔄 Limpiar Todo</button>';
    html += '<button class="btn btn-success" onclick="exportTesting()">📊 Exportar TXT</button>';
    html += '<button class="btn btn-secondary" onclick="expandAllTesting()">📂 Expandir todo</button>';
    html += '<button class="btn btn-secondary" onclick="collapseAllTesting()">📁 Colapsar todo</button>';
    html += '</div>';
    html += '<div class="test-saved" id="testSaved"></div>';

    let idx = 0;
    TEST_DATA.forEach(sec => {
        html += '<div class="test-section" id="testsec_' + sec.id + '">';
        html += '<div class="test-section-header" onclick="toggleTestSection(\'' + sec.id + '\')">';
        html += '<h4>' + sec.title + '</h4>';
        html += '<span class="tbadge" id="tbadge_' + sec.id + '">0/' + sec.tests.length + '</span>';
        html += '</div>';
        html += '<div class="test-section-body" id="tbody_' + sec.id + '">';
        sec.tests.forEach((t, i) => {
            const okChecked = saved["t_" + idx + "_ok"] ? "checked" : "";
            const failChecked = saved["t_" + idx + "_fail"] ? "checked" : "";
            const obs = saved["t_" + idx + "_obs"] || "";
            html += '<div class="test-row">';
            html += '<span class="t-num">' + (i+1) + '</span>';
            html += '<input type="checkbox" id="tok_' + idx + '" ' + okChecked + ' onchange="onTestChange()">';
            html += '<span class="t-label" style="color:#7ee787">✓</span>';
            html += '<input type="checkbox" id="tfail_' + idx + '" ' + failChecked + ' onchange="onTestChange()">';
            html += '<span class="t-label" style="color:#f85149">✗</span>';
            html += '<span class="t-desc">' + t + '</span>';
            html += '<div class="t-obs"><input type="text" id="tobs_' + idx + '" value="' + obs.replace(/"/g, '&quot;') + '" placeholder="Obs..." onchange="onTestChange()"></div>';
            html += '</div>';
            idx++;
        });
        html += '</div></div>';
    });

    html += '<div class="test-fail-list" id="testFailList" style="display:none"><h4>❌ Puntos a Corregir</h4><div id="testFailItems"></div></div>';

    c.innerHTML = html;
    updateTestStats();
}

function loadTesting() { loadTestingIn("content"); }

function toggleTestSection(id) {
    const body = document.getElementById("tbody_" + id);
    body.classList.toggle("hidden");
}

function expandAllTesting() { document.querySelectorAll('.test-section-body').forEach(b => b.classList.remove('hidden')); }
function collapseAllTesting() { document.querySelectorAll('.test-section-body').forEach(b => b.classList.add('hidden')); }

function onTestChange() { updateTestStats(); saveTestStorage(); }

function saveTestStorage() {
    const data = {};
    let idx = 0;
    TEST_DATA.forEach(sec => {
        sec.tests.forEach(() => {
            data["t_" + idx + "_ok"] = document.getElementById("tok_" + idx)?.checked || false;
            data["t_" + idx + "_fail"] = document.getElementById("tfail_" + idx)?.checked || false;
            data["t_" + idx + "_obs"] = document.getElementById("tobs_" + idx)?.value || "";
            idx++;
        });
    });
    data._date = new Date().toISOString();
    localStorage.setItem(TEST_KEY, JSON.stringify(data));
    const el = document.getElementById("testSaved");
    if (el) el.textContent = "Guardado: " + new Date().toLocaleString();
}

function updateTestStats() {
    let total = 0, ok = 0, fail = 0, pend = 0;
    const failedItems = [];

    let globalIdx = 0;
    TEST_DATA.forEach(sec => {
        let secOk = 0;
        sec.tests.forEach((t, i) => {
            const okCb = document.getElementById("tok_" + globalIdx);
            const failCb = document.getElementById("tfail_" + globalIdx);
            if (!okCb || !failCb) { globalIdx++; return; }
            total++;
            if (okCb.checked) { ok++; secOk++; }
            else if (failCb.checked) { fail++; failedItems.push({ sec: sec.title, desc: t, obs: document.getElementById("tobs_" + globalIdx)?.value || "" }); }
            else { pend++; }
            globalIdx++;
        });
        const badge = document.getElementById("tbadge_" + sec.id);
        if (badge) badge.textContent = secOk + "/" + secTotal;
    });

    const pct = total > 0 ? Math.round(ok / total * 100) : 0;
    const sumEl = document.getElementById("testSummary");
    if (sumEl) {
        sumEl.innerHTML = '<div class="test-stat total"><div class="num">' + total + '</div><div class="label">Total</div></div>' +
            '<div class="test-stat ok"><div class="num">' + ok + '</div><div class="label">Funciona</div></div>' +
            '<div class="test-stat fail"><div class="num">' + fail + '</div><div class="label">No funciona</div></div>' +
            '<div class="test-stat pend"><div class="num">' + pend + '</div><div class="label">Pendiente</div></div>' +
            '<div class="test-stat pct"><div class="num">' + pct + '%</div><div class="label">Aprobado</div></div>';
    }

    const banner = document.getElementById("testBanner");
    if (banner && total > 0) {
        if (pend === 0 && fail === 0) {
            banner.className = "test-banner show success";
            banner.innerHTML = '<h3>🎉 ¡FELICIDADES! EL SISTEMA FUNCIONA PERFECTO</h3><p>' + total + ' pruebas completadas. 100% aprobado.</p><p style="font-size:11px;color:#8b949e;margin-top:6px">Pendiente: integrar pasarela de pagos (Mercado Pago)</p>';
        } else if (pend === 0 && fail > 0) {
            banner.className = "test-banner show warning";
            banner.innerHTML = '<h3>⚠️ Testing completado - ' + pct + '% aprobado</h3><p>' + ok + ' de ' + total + ' pasaron. ' + fail + ' requieren corrección.</p>';
        } else {
            banner.className = "test-banner";
            banner.innerHTML = '';
        }
    }

    const failList = document.getElementById("testFailList");
    const failItems = document.getElementById("testFailItems");
    if (failList && failItems) {
        if (failedItems.length > 0) {
            failList.style.display = "block";
            failItems.innerHTML = failedItems.map(f => '<div class="test-fail-item"><span class="test-fail-sec">' + f.sec + '</span> ' + f.desc + (f.obs ? ' <em>(' + f.obs + ')</em>' : '') + '</div>').join("");
        } else {
            failList.style.display = "none";
        }
    }
}

function resetTesting() {
    if (!confirm("¿Limpiar todos los resultados de testing?")) return;
    localStorage.removeItem(TEST_KEY);
    loadTesting();
}

function exportTesting() {
    let text = "URBANFLOW - RESULTADOS DE TESTING\nEmpresa: " + (empresaData?.nombre || "") + "\nFecha: " + new Date().toLocaleString() + "\n\n";
    let total = 0, ok = 0, fail = 0, pend = 0, failedList = [];
    let globalIdx = 0;
    TEST_DATA.forEach(sec => {
        text += "\n=== " + sec.title + " ===\n";
        sec.tests.forEach((t, i) => {
            const okCb = document.getElementById("tok_" + globalIdx);
            const failCb = document.getElementById("tfail_" + globalIdx);
            const obs = document.getElementById("tobs_" + globalIdx)?.value || "";
            let status = "⏳ Pendiente";
            if (okCb?.checked) { status = "✓ Funciona"; ok++; }
            else if (failCb?.checked) { status = "✗ No funciona"; fail++; failedList.push({ sec: sec.title, desc: t, obs }); }
            else { pend++; }
            total++;
            text += (i+1) + ". " + t + " → " + status + (obs ? " (" + obs + ")" : "") + "\n";
            globalIdx++;
        });
    });
    text += "\n=== RESUMEN ===\n";
    text += "Total: " + total + "\nFunciona: " + ok + "\nNo funciona: " + fail + "\nPendiente: " + pend + "\n% Aprobado: " + (total > 0 ? Math.round(ok/total*100) : 0) + "%\n";
    if (failedList.length > 0) {
        text += "\n=== PUNTOS A CORREGIR ===\n";
        failedList.forEach(f => { text += "- [" + f.sec + "] " + f.desc + (f.obs ? " (" + f.obs + ")" : "") + "\n"; });
    }
    const blob = new Blob([text], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "testing_" + (empresaData?.nombre || "urbanflow") + "_" + new Date().toISOString().slice(0,10) + ".txt";
    a.click();
}
