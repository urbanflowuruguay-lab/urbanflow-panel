<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camarero - UrbanFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
        .header { background: #161b22; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 16px; color: #58a6ff; }
        .container { padding: 12px; max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        .pedido-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .pedido-card.nuevo { border-color: #7ee787; animation: glow 1.5s infinite; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px rgba(126,231,135,0.3); } 50% { box-shadow: 0 0 20px rgba(126,231,135,0.6); } }
        .pedido-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .pedido-id { font-weight: bold; color: #58a6ff; font-size: 16px; }
        .pedido-estado { padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .estado-listo { background: #238636; color: #7ee787; }
        .estado-entregado { background: #1f6feb; color: #a5d6ff; }
        .pedido-info { color: #8b949e; font-size: 13px; margin-bottom: 10px; line-height: 1.6; }
        .pedido-items { font-size: 14px; color: #c9d1d9; margin-bottom: 10px; font-weight: 500; }
        .pedido-mesa { background: #0d1117; border-radius: 8px; padding: 8px 12px; margin-bottom: 10px; font-size: 13px; border-left: 3px solid #f0883e; }
        .pedido-actions { display: flex; gap: 8px; margin-top: 8px; }
        .btn { padding: 12px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; flex: 1; text-align: center; }
        .btn:active { opacity: 0.8; transform: scale(0.98); }
        .btn-entregar { background: #238636; color: white; }
        .btn-navegar { background: #1f6feb; color: white; }
        .empty { text-align: center; padding: 60px 20px; color: #484f58; }
        .status-bar { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #238636; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #loginSection { max-width: 400px; margin: 60px auto; padding: 0 16px; }
        #loginSection h2 { color: #58a6ff; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; color: #8b949e; font-size: 12px; margin-bottom: 4px; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 16px; }
        .form-group input:focus { border-color: #58a6ff; outline: none; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        .btn-primary { background: #1f6feb; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; }
        .btn-cerrar { background: #da3633; color: white; padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div id="loginSection">
    <h2>Camarero</h2>
    <div class="card">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="loginNombre" placeholder="Tu nombre">
        </div>
        <div class="form-group">
            <label>Contrasena</label>
            <input type="password" id="pinInput" maxlength="4" placeholder="****" inputmode="numeric">
        </div>
        <button class="btn-primary" onclick="loginPin()">Entrar</button>
        <p id="loginError" style="color:#da3633;text-align:center;margin-top:12px;display:none"></p>
    </div>
</div>

<div id="camareroSection" style="display:none">
    <div class="header">
        <div style="display:flex;align-items:center;gap:12px">
            <div id="workerPhoto" style="width:44px;height:44px;border-radius:50%;background:#30363d;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;flex-shrink:0">👤</div>
            <div>
                <h1 id="empresaNombre">Camarero</h1>
                <span style="color:#8b949e;font-size:12px" id="workerName"></span>
            </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
            <button onclick="showChangePin()" style="background:#30363d;color:#c9d1d9;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px">🔑 Cambiar clave</button>
            <button class="btn-cerrar" onclick="location.reload()">Salir</button>
        </div>
    </div>
    <div class="container">
        <div class="status-bar">
            <span class="dot"></span>
            <span>En linea</span>
            <span style="flex:1"></span>
            <span style="color:#8b949e;font-size:12px" id="pedidoCount">0 pedidos</span>
        </div>
        <div id="pedidosContainer">
            <div class="empty">Cargando pedidos...</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://eyfgkopaamnkprzpwocz.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5Zmdrb3BhYW1ua3ByenB3b2N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTk0ODMsImV4cCI6MjA5NDE5NTQ4M30.bXkq4Ks3p2yb2SQH76__8jXhmM5Thi2izIL5UPkKa0I";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const params = new URLSearchParams(window.location.search);
let empresaId = params.get("empresa") || "";
let empresaData = null;
let usuarioData = null;
let prevCount = 0;

const notifSound = new Audio("data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgip2+q2EcDjiRtculcBwLH3y6xZ9TEwwfjL3NplkRCx+St8miVhQMG5C3yZ9VEQsdkLjJn1YSDBySt8eYUxEJHZK4yJZQDgcdlLjHlE0NBR2VuMeTTQ0DHpW5xo1KCwEelrjFi0UJAB+XucOIRAEAH5i6wIVB/wAhmbrAfD37ACOausB3OvkAKJy6v3I39wAmnbrAbzPzAC2dub9sMPEAMp25v2kv7wA0nrm9ZSzsADSfub1jKusANJ+5vV8o5wA1n7m9XSbiADafub1bIdoANp+5vVkf1QA3n7m9WR3SADifub1XGs8AOp+5vVcZywA5n7m9VhfIADufub1WFcYAPJ+5vVUUwQA9n7m9VRK7AD6fub1VEbYAP5+5vVMOsgBAn7m9UwuwAEGfub1SCa0AQp+5vVEHqgBDn7m9UAWnAESfub1PA6MARZ+5vU4ApABGn7m9Tf6hAEefub1M/Z8ASJ+5vUv8nQBJn7m9SvubAEqfub1J+pgAS5+5vUj5lgBLn7m9R/eVAEyfub1G9pMATJ+5vUX0kABNn7m9RPKMAE6fub1D8YkAT5+5vULwhwBQn7m9QfCEAFCfub0=");

function playNotif() { notifSound.currentTime = 0; notifSound.play().catch(() => {}); }

document.getElementById("pinInput").addEventListener("keypress", e => { if (e.key === "Enter") loginPin(); });

async function loginPin() {
    const nombre = document.getElementById("loginNombre").value.trim();
    const pin = document.getElementById("pinInput").value.trim();
    if (!nombre) { showError("Ingresa tu nombre"); return; }
    if (!pin) { showError("Ingresa tu contrasena"); return; }
    const { data: usuarios } = await sb.from("usuarios_empresa").select("*, empresas(id,nombre)").eq("pin", pin).eq("activo", true);
    if (!usuarios || usuarios.length === 0) { showError("Contrasena incorrecta"); return; }
    const usr = usuarios.find(u => u.nombre && u.nombre.toLowerCase() === nombre.toLowerCase()) || usuarios[0];
    if (usr.nombre && usr.nombre.toLowerCase() !== nombre.toLowerCase()) { showError("Nombre no registrado"); return; }
    if (usr.rol !== "camarero" && usr.rol !== "admin") { showError("Este usuario no es camarero"); return; }
    empresaId = usr.empresa_id;
    empresaData = usr.empresas;
    usuarioData = usr;
    document.getElementById("empresaNombre").textContent = empresaData?.nombre || "Camarero";
    document.getElementById("workerName").textContent = usuarioData?.nombre || "";
    if (usuarioData.foto_url) {
        document.getElementById("workerPhoto").innerHTML = '<img src="' + usuarioData.foto_url + '" style="width:100%;height:100%;object-fit:cover">';
    }
    document.getElementById("loginSection").style.display = "none";
    if (!usuarioData.foto_url) {
        showForcePhoto();
    } else {
        document.getElementById("camareroSection").style.display = "block";
        loadPedidos();
        setInterval(loadPedidos, 8000);
    }
}

function showError(msg) {
    const el = document.getElementById("loginError");
    el.textContent = msg;
    el.style.display = "block";
}

function showForcePhoto() {
    let html = `<div id="forcePhotoModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#0d1117;z-index:400;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
        <div style="font-size:48px;margin-bottom:16px">📸</div>
        <h2 style="color:#58a6ff;margin-bottom:8px;text-align:center">Necesitamos tu foto</h2>
        <p style="color:#8b949e;font-size:14px;text-align:center;margin-bottom:24px;max-width:300px">Para que los clientes te reconozcan, subí una foto de perfil. Sin foto no podés usar el sistema.</p>
        <div id="photoPreview" style="width:120px;height:120px;border-radius:50%;background:#161b22;border:3px dashed #30363d;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:20px;overflow:hidden">👤</div>
        <input type="file" id="photoInput" accept="image/*" capture="user" style="display:none" onchange="previewPhoto(this)">
        <button onclick="document.getElementById('photoInput').click()" style="width:100%;max-width:300px;padding:14px;background:#1f6feb;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;font-weight:600;margin-bottom:12px">📸 Sacar foto / Elegir</button>
        <button id="btnSavePhoto" onclick="savePhoto()" disabled style="width:100%;max-width:300px;padding:14px;background:#238636;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;font-weight:600;opacity:0.5">Guardar y continuar</button>
        <p id="photoError" style="color:#da3633;font-size:13px;margin-top:12px;display:none"></p>
    </div>`;
    document.body.insertAdjacentHTML("beforeend", html);
}

function previewPhoto(input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById("photoPreview").innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover">';
        document.getElementById("btnSavePhoto").disabled = false;
        document.getElementById("btnSavePhoto").style.opacity = "1";
        window._photoData = e.target.result;
    };
    reader.readAsDataURL(file);
}

async function savePhoto() {
    if (!window._photoData) return;
    const btn = document.getElementById("btnSavePhoto");
    btn.disabled = true;
    btn.textContent = "Subiendo...";

    try {
        const base64 = window._photoData.split(",")[1];
        const ext = window._photoData.includes("png") ? "png" : "jpg";
        const fileName = "fotos/" + usuarioData.id + "." + ext;

        const resp = await fetch("https://eyfgkopaamnkprzpwocz.supabase.co/storage/v1/object/avatars/" + fileName, {
            method: "POST",
            headers: {
                "apikey": SUPABASE_ANON,
                "Authorization": "Bearer " + SUPABASE_ANON,
                "Content-Type": "image/" + ext
            },
            body: Uint8Array.from(atob(base64), c => c.charCodeAt(0))
        });

        if (!resp.ok && resp.status !== 409) {
            const err = await resp.text();
            console.error("Storage error:", err);
            document.getElementById("photoError").textContent = "Error subiendo foto: " + resp.status;
            document.getElementById("photoError").style.display = "block";
            btn.disabled = false;
            btn.textContent = "Guardar y continuar";
            return;
        }

        const publicUrl = "https://eyfgkopaamnkprzpwocz.supabase.co/storage/v1/object/public/avatars/" + fileName;
        await sb.from("usuarios_empresa").update({ foto_url: publicUrl }).eq("id", usuarioData.id);
        usuarioData.foto_url = publicUrl;

        document.getElementById("forcePhotoModal").remove();
        document.getElementById("workerPhoto").innerHTML = '<img src="' + publicUrl + '" style="width:100%;height:100%;object-fit:cover">';
        document.getElementById("camareroSection").style.display = "block";
        loadPedidos();
        setInterval(loadPedidos, 8000);
    } catch (e) {
        console.error("Error:", e);
        document.getElementById("photoError").textContent = "Error: " + e.message;
        document.getElementById("photoError").style.display = "block";
        btn.disabled = false;
        btn.textContent = "Guardar y continuar";
    }
}

async function loadPedidos() {
    if (!empresaId) return;
    const { data: pedidos } = await sb.from("pedidos").select("*").eq("empresa_id", empresaId)
        .in("estado", ["listo", "entregado"])
        .order("created_at", { ascending: true });

    const container = document.getElementById("pedidosContainer");
    const pedidosList = pedidos || [];
    document.getElementById("pedidoCount").textContent = pedidosList.length + " pedidos";

    if (pedidosList.length > prevCount && prevCount > 0) playNotif();
    prevCount = pedidosList.length;

    if (pedidosList.length === 0) {
        container.innerHTML = '<div class="empty">Sin pedidos para entregar</div>';
        return;
    }

    container.innerHTML = pedidosList.map(p => {
        const esMesa = p.tipo_entrega === "Mesa";
        const fecha = new Date(p.created_at).toLocaleTimeString("es-UY", { hour: "2-digit", minute: "2-digit" });
        let items = [];
        try { items = typeof p.items === "string" ? JSON.parse(p.items) : (p.items || []); } catch(e) {}
        const itemsHtml = items.map(i => `${i.cantidad || 1}x ${i.nombre || i}`).join(", ");

        return `<div class="pedido-card ${p.estado === 'listo' ? 'nuevo' : ''}">
            <div class="pedido-header">
                <span class="pedido-id">#${p.id.substring(0,8).toUpperCase()}</span>
                <span class="pedido-estado ${p.estado === 'listo' ? 'estado-listo' : 'estado-entregado'}">${p.estado === 'listo' ? 'LISTO PARA ENTREGAR' : 'ENTREGADO'}</span>
            </div>
            <div class="pedido-items">${itemsHtml}</div>
            ${esMesa ? `<div class="pedido-mesa">🍽️ Mesa ${p.notas?.replace('Mesa #','') || ''}</div>` : ""}
            <div class="pedido-info">${p.cliente_nombre || "Cliente"} | ${fecha}</div>
            <div class="pedido-actions">
                ${p.estado === "listo" ? `<button class="btn btn-entregar" onclick="entregarPedido('${p.id}','${p.notas || ''}')">✅ Entregado en Mesa</button>` : ""}
            </div>
        </div>`;
    }).join("");
}

async function entregarPedido(id, notas) {
    await sb.from("pedidos").update({ estado: "entregado", delivered_at: new Date().toISOString() }).eq("id", id);
    loadPedidos();
}

function showChangePin() {
    let html = `<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:300;display:flex;align-items:center;justify-content:center" onclick="if(event.target===this)this.remove()">
        <div style="background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;width:90%;max-width:320px">
            <h3 style="color:#58a6ff;margin-bottom:12px">Cambiar contrasena</h3>
            <input type="password" id="newPin" maxlength="4" placeholder="Nueva clave (4 digitos)" inputmode="numeric" style="width:100%;padding:12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:16px;text-align:center;letter-spacing:4px;margin-bottom:8px">
            <input type="password" id="newPin2" maxlength="4" placeholder="Repetir clave" inputmode="numeric" style="width:100%;padding:12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:16px;text-align:center;letter-spacing:4px;margin-bottom:12px">
            <p id="pinError" style="color:#da3633;font-size:13px;display:none"></p>
            <button onclick="saveNewPin()" style="width:100%;padding:12px;background:#238636;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600">Guardar</button>
        </div>
    </div>`;
    document.body.insertAdjacentHTML("beforeend", html);
}

async function saveNewPin() {
    const pin1 = document.getElementById("newPin").value.trim();
    const pin2 = document.getElementById("newPin2").value.trim();
    const errEl = document.getElementById("pinError");
    if (pin1.length !== 4 || !/^\d+$/.test(pin1)) { errEl.textContent = "La clave debe ser 4 digitos"; errEl.style.display = "block"; return; }
    if (pin1 !== pin2) { errEl.textContent = "Las claves no coinciden"; errEl.style.display = "block"; return; }
    await sb.from("usuarios_empresa").update({ pin: pin1 }).eq("id", usuarioData.id);
    document.querySelector("[style*='fixed']").remove();
    alert("Contrasena actualizada");
}
</script>
</body>
</html>
