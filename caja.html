<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caja - UrbanFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
        .header { background: #161b22; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 16px; color: #58a6ff; }
        .container { padding: 12px; max-width: 500px; margin: 0 auto; padding-bottom: 80px; }
        .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .summary-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 14px 10px; text-align: center; }
        .summary-card .num { font-size: 22px; font-weight: 700; }
        .summary-card .label { font-size: 11px; color: #8b949e; text-transform: uppercase; margin-top: 2px; }
        .section-title { color: #58a6ff; font-size: 14px; font-weight: 600; margin: 16px 0 10px; display: flex; align-items: center; gap: 6px; }
        .section-title .count { background: #30363d; color: #8b949e; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
        .pedido-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
        .pedido-card.pendiente { border-left: 4px solid #f0883e; }
        .pedido-card.pagado { border-left: 4px solid #238636; }
        .pedido-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .pedido-id { font-weight: bold; color: #58a6ff; font-size: 14px; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-pendiente { background: #f0883e22; color: #f0883e; }
        .badge-pagado { background: #23863622; color: #7ee787; }
        .pedido-items { font-size: 13px; color: #8b949e; margin-bottom: 6px; }
        .pedido-mesa { font-size: 12px; color: #f0883e; margin-bottom: 4px; }
        .pedido-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .pedido-total { font-size: 20px; font-weight: 700; color: #7ee787; }
        .pedido-hora { font-size: 12px; color: #484f58; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 700; width: 100%; }
        .btn:active { opacity: 0.8; transform: scale(0.98); }
        .btn-cobrar { background: #f0883e; color: #0d1117; }
        .btn-cobrado { background: #238636; color: white; }
        .empty { text-align: center; padding: 40px 20px; color: #484f58; font-size: 14px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #238636; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #loginSection { max-width: 400px; margin: 60px auto; padding: 0 16px; }
        #loginSection h2 { color: #58a6ff; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; color: #8b949e; font-size: 12px; margin-bottom: 4px; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 16px; }
        .form-group input:focus { border-color: #58a6ff; outline: none; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        .btn-primary { background: #1f6feb; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; }
        .btn-cerrar { background: #da3633; color: white; padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .worker-info { display: flex; align-items: center; gap: 10px; }
        .worker-photo { width: 36px; height: 36px; border-radius: 50%; background: #30363d; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .worker-photo img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="loginSection">
    <h2>Caja</h2>
    <div class="card">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="loginNombre" placeholder="Tu nombre" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Contrasena</label>
            <input type="password" id="pinInput" maxlength="4" placeholder="****" inputmode="numeric" autocomplete="new-password">
        </div>
        <button class="btn-primary" onclick="loginPin()">Entrar</button>
        <p id="loginError" style="color:#da3633;text-align:center;margin-top:12px;display:none"></p>
    </div>
</div>

<div id="cajaSection" style="display:none">
    <div class="header">
        <div class="worker-info">
            <div class="worker-photo" id="workerPhoto">👤</div>
            <div>
                <h1 id="empresaNombre">Caja</h1>
                <span style="color:#8b949e;font-size:12px" id="workerName"></span>
            </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
            <button onclick="showChangePin()" style="background:#30363d;color:#c9d1d9;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px">🔑</button>
            <button class="btn-cerrar" onclick="location.reload()">Salir</button>
        </div>
    </div>
    <div class="container">
        <div class="summary">
            <div class="summary-card"><div class="num" style="color:#f0883e" id="statPendiente">$0</div><div class="label">Por cobrar</div></div>
            <div class="summary-card"><div class="num" style="color:#7ee787" id="statCobrado">$0</div><div class="label">Cobrado</div></div>
            <div class="summary-card"><div class="num" style="color:#58a6ff" id="statPedidos">0</div><div class="label">Pedidos</div></div>
        </div>

        <div class="section-title">🔔 Por cobrar <span class="count" id="countPendiente">0</span></div>
        <div id="pendientesContainer"><div class="empty">Sin pedidos pendientes</div></div>

        <div class="section-title" style="margin-top:20px">📋 Cobrados hoy <span class="count" id="countPagados">0</span></div>
        <div id="pagadosContainer"><div class="empty">Sin pagos hoy</div></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://eyfgkopaamnkprzpwocz.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5Zmdrb3BhYW1ua3ByenB3b2N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTk0ODMsImV4cCI6MjA5NDE5NTQ4M30.bXkq4Ks3p2yb2SQH76__8jXhmM5Thi2izIL5UPkKa0I";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const params = new URLSearchParams(window.location.search);
let empresaId = params.get("empresa") || "";
let empresaData = null;
let usuarioData = null;

document.getElementById("pinInput").addEventListener("keypress", e => { if (e.key === "Enter") loginPin(); });

async function loginPin() {
    const nombre = document.getElementById("loginNombre").value.trim();
    const pin = document.getElementById("pinInput").value.trim();
    if (!nombre) { showError("Ingresa tu nombre"); return; }
    if (!pin) { showError("Ingresa tu contrasena"); return; }
    const { data: usuarios } = await sb.from("usuarios_empresa").select("*, empresas(id,nombre)").eq("pin", pin).eq("activo", true);
    if (!usuarios || usuarios.length === 0) { showError("Contrasena incorrecta"); return; }
    const usr = usuarios.find(u => u.nombre && u.nombre.toLowerCase() === nombre.toLowerCase()) || usuarios[0];
    if (usr.nombre && usr.nombre.toLowerCase() !== nombre.toLowerCase()) { showError("Nombre no registrado"); return; }
    if (usr.rol !== "caja" && usr.rol !== "admin") { showError("Este usuario no es de caja"); return; }
    empresaId = usr.empresa_id;
    empresaData = usr.empresas;
    usuarioData = usr;
    document.getElementById("empresaNombre").textContent = empresaData?.nombre || "Caja";
    document.getElementById("workerName").textContent = usuarioData?.nombre || "";
    if (usuarioData.foto_url) {
        document.getElementById("workerPhoto").innerHTML = '<img src="' + usuarioData.foto_url + '">';
    }
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("cajaSection").style.display = "block";
    loadPedidos();
    setInterval(loadPedidos, 8000);
}

function showError(msg) {
    const el = document.getElementById("loginError");
    el.textContent = msg;
    el.style.display = "block";
}

function formatTime(ts) {
    return new Date(ts).toLocaleTimeString("es-UY", { hour: "2-digit", minute: "2-digit" });
}

function parseItems(items) {
    try { return typeof items === "string" ? JSON.parse(items) : (items || []); } catch { return []; }
}

async function loadPedidos() {
    if (!empresaId) return;
    const { data: pedidos } = await sb.from("pedidos").select("*").eq("empresa_id", empresaId).order("created_at", { ascending: false });

    const all = pedidos || [];
    const pendientes = all.filter(p => p.estado === "entregado");
    const pagados = all.filter(p => p.estado === "pagado" && new Date(p.created_at).toDateString() === new Date().toDateString());

    let totalPendiente = 0, totalCobrado = 0;
    pendientes.forEach(p => totalPendiente += parseFloat(p.total) || 0);
    pagados.forEach(p => totalCobrado += parseFloat(p.total) || 0);

    document.getElementById("statPendiente").textContent = "$" + totalPendiente.toLocaleString();
    document.getElementById("statCobrado").textContent = "$" + totalCobrado.toLocaleString();
    document.getElementById("statPedidos").textContent = pendientes.length + pagados.length;
    document.getElementById("countPendiente").textContent = pendientes.length;
    document.getElementById("countPagados").textContent = pagados.length;

    const pendContainer = document.getElementById("pendientesContainer");
    if (pendientes.length === 0) {
        pendContainer.innerHTML = '<div class="empty">Sin pedidos pendientes</div>';
    } else {
        pendContainer.innerHTML = pendientes.map(p => {
            const items = parseItems(p.items);
            const itemsHtml = items.map(i => `${i.cantidad || 1}x ${i.nombre}`).join(", ");
            const esMesa = p.tipo_entrega === "Mesa";
            return `<div class="pedido-card pendiente">
                <div class="pedido-top">
                    <span class="pedido-id">#${p.id.substring(0,8).toUpperCase()}</span>
                    <span class="badge badge-pendiente">SIN PAGAR</span>
                </div>
                <div class="pedido-items">${itemsHtml}</div>
                ${esMesa ? `<div class="pedido-mesa">🍽️ Mesa ${p.notas?.replace('Mesa #','') || ''}</div>` : ""}
                <div class="pedido-bottom">
                    <span class="pedido-total">$${(parseFloat(p.total) || 0).toLocaleString()}</span>
                    <span class="pedido-hora">${formatTime(p.created_at)}</span>
                </div>
                <button class="btn btn-cobrar" style="margin-top:10px" onclick="cobrar('${p.id}')">💰 COBRAR</button>
            </div>`;
        }).join("");
    }

    const pagContainer = document.getElementById("pagadosContainer");
    if (pagados.length === 0) {
        pagContainer.innerHTML = '<div class="empty">Sin pagos hoy</div>';
    } else {
        pagContainer.innerHTML = pagados.map(p => {
            const items = parseItems(p.items);
            const itemsHtml = items.map(i => `${i.cantidad || 1}x ${i.nombre}`).join(", ");
            const esMesa = p.tipo_entrega === "Mesa";
            return `<div class="pedido-card pagado">
                <div class="pedido-top">
                    <span class="pedido-id">#${p.id.substring(0,8).toUpperCase()}</span>
                    <span class="badge badge-pagado">PAGADO</span>
                </div>
                <div class="pedido-items">${itemsHtml}</div>
                ${esMesa ? `<div class="pedido-mesa">🍽️ Mesa ${p.notas?.replace('Mesa #','') || ''}</div>` : ""}
                <div class="pedido-bottom">
                    <span class="pedido-total">$${(parseFloat(p.total) || 0).toLocaleString()}</span>
                    <span class="pedido-hora">${formatTime(p.created_at)}</span>
                </div>
            </div>`;
        }).join("");
    }
}

async function cobrar(id) {
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = "Procesando...";
    await sb.from("pedidos").update({ estado: "pagado" }).eq("id", id);
    loadPedidos();
}

function showChangePin() {
    let html = `<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:300;display:flex;align-items:center;justify-content:center" onclick="if(event.target===this)this.remove()">
        <div style="background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;width:90%;max-width:320px">
            <h3 style="color:#58a6ff;margin-bottom:12px">Cambiar contrasena</h3>
            <input type="password" id="newPin" maxlength="4" placeholder="Nueva clave (4 digitos)" inputmode="numeric" style="width:100%;padding:12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:16px;text-align:center;letter-spacing:4px;margin-bottom:8px">
            <input type="password" id="newPin2" maxlength="4" placeholder="Repetir clave" inputmode="numeric" style="width:100%;padding:12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:16px;text-align:center;letter-spacing:4px;margin-bottom:12px">
            <p id="pinError" style="color:#da3633;font-size:13px;display:none"></p>
            <button onclick="saveNewPin()" style="width:100%;padding:12px;background:#238636;color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600">Guardar</button>
        </div>
    </div>`;
    document.body.insertAdjacentHTML("beforeend", html);
}

async function saveNewPin() {
    const pin1 = document.getElementById("newPin").value.trim();
    const pin2 = document.getElementById("newPin2").value.trim();
    const errEl = document.getElementById("pinError");
    if (pin1.length !== 4 || !/^\d+$/.test(pin1)) { errEl.textContent = "La clave debe ser 4 digitos"; errEl.style.display = "block"; return; }
    if (pin1 !== pin2) { errEl.textContent = "Las claves no coinciden"; errEl.style.display = "block"; return; }
    await sb.from("usuarios_empresa").update({ pin: pin1 }).eq("id", usuarioData.id);
    document.querySelector("[style*='fixed']").remove();
    alert("Contrasena actualizada");
}
</script>
</body>
</html>
