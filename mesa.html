<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carta - UrbanFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
            --border: #30363d; --text: #c9d1d9; --text2: #8b949e;
            --accent: #58a6ff; --accent2: #1f6feb; --price: #7ee787;
            --success: #238636; --danger: #da3633; --muted: #484f58;
            --font: 'Inter', 'Segoe UI', sans-serif; --font-heading: 'Inter', sans-serif;
            --card-radius: 10px; --card-shadow: none;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: var(--font); color: var(--text); height: 100%; overflow: hidden; }
        body { background: var(--bg); }
        .app-layout { display: flex; flex-direction: column; height: 100vh; }
        .categorias { position: sticky; top: 0; z-index: 10; display: flex; gap: 8px; overflow-x: auto; padding: 12px 12px 8px; -webkit-overflow-scrolling: touch; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .cat-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; white-space: nowrap; flex-shrink: 0; font-family: var(--font); }
        .cat-btn.active { background: var(--accent2); color: white; border-color: var(--accent2); }
        .productos-scroll { flex: 1; overflow-y: auto; padding: 12px 12px 80px; -webkit-overflow-scrolling: touch; }
        .producto-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 12px; margin-bottom: 10px; display: flex; gap: 12px; box-shadow: var(--card-shadow); }
        .producto-img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; background: var(--bg3); flex-shrink: 0; }
        .producto-info { flex: 1; min-width: 0; }
        .producto-nombre { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
        .producto-desc { color: var(--text2); font-size: 12px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .producto-precio { font-weight: bold; color: var(--price); font-size: 16px; }
        .producto-add { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
        .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-btn:active { background: var(--accent2); border-color: var(--accent2); }
        .qty-num { font-size: 16px; font-weight: bold; min-width: 20px; text-align: center; }
        .add-btn { background: var(--accent2); color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: var(--font); }
        .add-btn:active { opacity: 0.8; }

        .carrito-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        .carrito-bar .items-count { color: var(--text2); font-size: 14px; }
        .carrito-bar .total { font-weight: bold; color: var(--price); font-size: 18px; }
        .carrito-btn { background: var(--success); color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: var(--font); }
        .carrito-btn:disabled { background: var(--bg3); color: var(--muted); cursor: not-allowed; }
        .carrito-btn:active:not(:disabled) { opacity: 0.8; }

        .carrito-panel { display: none; position: fixed; bottom: 60px; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); padding: 16px; max-height: 50vh; overflow-y: auto; z-index: 19; }
        .carrito-panel.show { display: block; }
        .carrito-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--bg3); }
        .carrito-item:last-child { border-bottom: none; }
        .carrito-item .nombre { font-size: 14px; }
        .carrito-item .precio { color: var(--price); font-weight: 600; }
        .carrito-item .remove { color: var(--danger); cursor: pointer; font-size: 18px; padding: 0 4px; }

        .nombre-input { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        .nombre-input.show { display: flex; }
        .nombre-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 90%; max-width: 350px; }
        .nombre-box h3 { color: var(--accent); margin-bottom: 12px; text-align: center; }
        .nombre-box input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 16px; margin-bottom: 12px; font-family: var(--font); }
        .nombre-box .btn-row { display: flex; gap: 8px; }
        .nombre-box .btn-row button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); }

        .estado-pedido { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 300; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 24px; }
        .estado-pedido.show { display: flex; }
        .estado-pedido .icon { font-size: 64px; margin-bottom: 16px; }
        .estado-pedido h2 { color: var(--accent); margin-bottom: 8px; }
        .estado-pedido p { color: var(--text2); font-size: 14px; line-height: 1.6; }
        .estado-pedido .volver { margin-top: 24px; background: var(--bg3); color: var(--text); border: none; border-radius: 8px; padding: 10px 24px; cursor: pointer; font-size: 14px; font-family: var(--font); }

        .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
        .precio-original { text-decoration: line-through; color: var(--muted); font-size: 12px; margin-right: 4px; }

        /* PORTADA */
        .portada { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 500; background: #000; }
        .portada.show { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .portada-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-size: 100% 100%; background-repeat: no-repeat; background-position: center; background-color: #000; }
        .portada-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
        .portada-content { position: relative; z-index: 2; text-align: center; padding: 32px; }
        .portada-logo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255,255,255,0.3); margin-bottom: 20px; }
        .portada-nombre { font-size: 28px; font-weight: 700; margin-bottom: 8px; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
        .portada-mesa { font-size: 16px; opacity: 0.8; margin-bottom: 32px; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
        .portada-btn { padding: 14px 48px; border: 2px solid rgba(255,255,255,0.5); border-radius: 30px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); color: white; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s; letter-spacing: 1px; font-family: inherit; }
        .portada-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.97); }
        .portada-footer { position: relative; z-index: 2; color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 40px; }
    </style>
</head>
<body>

<div class="portada show" id="portada">
    <div class="portada-bg" id="portadaBg"></div>
    <div class="portada-overlay" id="portadaOverlay"></div>
    <div class="portada-content">
        <img id="portadaLogo" class="portada-logo" src="" style="display:none">
        <div class="portada-nombre" id="portadaNombre">Restaurante</div>
        <div class="portada-mesa" id="portadaMesa">Mesa #-</div>
        <button class="portada-btn" onclick="entrarCarta()">ENTRAR</button>
    </div>
    <div class="portada-footer">Powered by UrbanFlow</div>
</div>

<div class="app-layout">
    <div class="categorias" id="categoriasBar"></div>
    <div class="productos-scroll" id="mainContent">
        <div class="empty" style="padding-top:80px">
            <p>Cargando carta...</p>
        </div>
    </div>
</div>

<div class="carrito-bar" id="carritoBar" style="display:none">
    <div>
        <div class="items-count" id="carritoCount">0 items</div>
        <div class="total" id="carritoTotal">$0</div>
    </div>
    <button class="carrito-btn" id="btnPedir" disabled onclick="showNombreInput()">Pedir</button>
</div>

<div class="carrito-panel" id="carritoPanel"></div>

<div class="nombre-input" id="nombreInput">
    <div class="nombre-box">
        <h3>Tu nombre</h3>
        <input type="text" id="clienteNombre" placeholder="Como te llamas?">
        <div class="btn-row">
            <button style="background:var(--bg3);color:var(--text)" onclick="hideNombreInput()">Volver</button>
            <button style="background:var(--success);color:white" onclick="confirmarPedido()">Confirmar y Pagar</button>
        </div>
    </div>
</div>

<div class="estado-pedido" id="estadoPedido">
    <div class="icon">🍳</div>
    <h2>Tu pedido esta en proceso</h2>
    <p>Ya lo llevaremos a tu mesa.<br>Mientras tanto, podes seguir pidiendo o relajarte.</p>
    <p id="pedidoIdDisplay" style="color:var(--accent);margin-top:12px;font-size:12px"></p>
    <button class="volver" onclick="volverCarta()">Volver a la carta</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://eyfgkopaamnkprzpwocz.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5Zmdrb3BhYW1ua3ByenB3b2N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTk0ODMsImV4cCI6MjA5NDE5NTQ4M30.bXkq4Ks3p2yb2SQH76__8jXhmM5Thi2izIL5UPkKa0I";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const params = new URLSearchParams(window.location.search);
const mesaToken = params.get("mesa") || "";
const empresaId = params.get("empresa") || "";

let empresaData = null;
let mesaData = null;
let productos = [];
let carrito = [];
let clienteToken = localStorage.getItem("cliente_token_" + mesaToken) || crypto.randomUUID();
localStorage.setItem("cliente_token_" + mesaToken, clienteToken);

const themes = {
    dark_elegance: { bg: "#0a0a0a", bg2: "#141414", bg3: "#1e1e1e", border: "#2a2a2a", text: "#e8e8e8", text2: "#999", accent: "#d4af37", accent2: "#b8960c", price: "#d4af37", success: "#2d8a4e", danger: "#c0392b", muted: "#555", font: "'Inter', sans-serif", fontHeading: "'Playfair Display', serif", cardRadius: "12px", cardShadow: "0 4px 20px rgba(0,0,0,0.4)" },
    editorial: { bg: "#faf6ee", bg2: "#f0ebe0", bg3: "#e6dfd2", border: "#d4c9b5", text: "#1a1612", text2: "#6b5e4f", accent: "#6b1d1d", accent2: "#8b2500", price: "#6b1d1d", success: "#2d6a3f", danger: "#991b1b", muted: "#9a8b7a", font: "'Lora', serif", fontHeading: "'Playfair Display', serif", cardRadius: "8px", cardShadow: "0 2px 8px rgba(0,0,0,0.08)" },
    minimalista: { bg: "#ffffff", bg2: "#ffffff", bg3: "#f5f5f5", border: "#e5e5e5", text: "#171717", text2: "#737373", accent: "#000000", accent2: "#171717", price: "#171717", success: "#16a34a", danger: "#dc2626", muted: "#a3a3a3", font: "'Inter', sans-serif", fontHeading: "'Inter', sans-serif", cardRadius: "6px", cardShadow: "none" },
    bold_colorido: { bg: "#111111", bg2: "#1a1a2e", bg3: "#16213e", border: "#0f3460", text: "#f1faee", text2: "#a8dadc", accent: "#e63946", accent2: "#d62828", price: "#f77f00", success: "#2d6a4f", danger: "#e63946", muted: "#457b9d", font: "'Inter', sans-serif", fontHeading: "'Inter', sans-serif", cardRadius: "14px", cardShadow: "0 4px 24px rgba(230,57,70,0.15)" },
    glassmorphism: { bg: "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)", bg2: "rgba(255,255,255,0.08)", bg3: "rgba(255,255,255,0.05)", border: "rgba(255,255,255,0.12)", text: "#e0e0ff", text2: "rgba(255,255,255,0.6)", accent: "#a78bfa", accent2: "#7c3aed", price: "#34d399", success: "#10b981", danger: "#f87171", muted: "rgba(255,255,255,0.3)", font: "'Inter', sans-serif", fontHeading: "'Inter', sans-serif", cardRadius: "16px", cardShadow: "0 8px 32px rgba(0,0,0,0.3)" },
    rustico: { bg: "#f5f0e8", bg2: "#efe8db", bg3: "#e6ddd0", border: "#d4c5a9", text: "#3e2723", text2: "#6d4c41", accent: "#8b4513", accent2: "#a0522d", price: "#8b4513", success: "#556b2f", danger: "#b22222", muted: "#8d7b68", font: "'Lora', serif", fontHeading: "'Playfair Display', serif", cardRadius: "6px", cardShadow: "0 2px 12px rgba(62,39,35,0.1)" }
};

function applyTheme(templateId) {
    const t = themes[templateId] || themes.dark_elegance;
    const r = document.documentElement.style;
    r.setProperty("--bg", t.bg); r.setProperty("--bg2", t.bg2); r.setProperty("--bg3", t.bg3);
    r.setProperty("--border", t.border); r.setProperty("--text", t.text); r.setProperty("--text2", t.text2);
    r.setProperty("--accent", t.accent); r.setProperty("--accent2", t.accent2); r.setProperty("--price", t.price);
    r.setProperty("--success", t.success); r.setProperty("--danger", t.danger); r.setProperty("--muted", t.muted);
    r.setProperty("--font", t.font); r.setProperty("--font-heading", t.fontHeading);
    r.setProperty("--card-radius", t.cardRadius); r.setProperty("--card-shadow", t.cardShadow);
    document.body.style.background = t.bg;
    document.body.style.fontFamily = t.font;
}

function entrarCarta() {
    document.getElementById("portada").classList.remove("show");
}

function applyPortadaTheme(templateId) {
    const t = themes[templateId] || themes.dark_elegance;
    const overlay = document.getElementById("portadaOverlay");
    const portadaBg = document.getElementById("portadaBg");
    const nombre = document.getElementById("portadaNombre");
    const mesa = document.getElementById("portadaMesa");
    const btn = document.querySelector(".portada-btn");
    const hasImage = portadaBg.style.backgroundImage && portadaBg.style.backgroundImage !== "none";
    switch(templateId) {
        case "dark_elegance": if (!hasImage) portadaBg.style.background = "linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%)"; overlay.style.background = "rgba(0,0,0,0.4)"; nombre.style.color = "#d4af37"; mesa.style.color = "rgba(212,175,55,0.7)"; btn.style.borderColor = "rgba(212,175,55,0.4)"; btn.style.color = "#d4af37"; break;
        case "editorial": if (!hasImage) portadaBg.style.background = "linear-gradient(180deg, #2c1810 0%, #4a2c20 50%, #1a0f0a 100%)"; overlay.style.background = "rgba(0,0,0,0.3)"; nombre.style.color = "#faf6ee"; mesa.style.color = "rgba(250,246,238,0.6)"; btn.style.borderColor = "rgba(250,246,238,0.4)"; btn.style.color = "#faf6ee"; break;
        case "minimalista": if (!hasImage) portadaBg.style.background = "linear-gradient(135deg, #111 0%, #333 50%, #111 100%)"; overlay.style.background = "rgba(0,0,0,0.5)"; nombre.style.color = "#ffffff"; mesa.style.color = "rgba(255,255,255,0.6)"; btn.style.borderColor = "rgba(255,255,255,0.5)"; btn.style.color = "#ffffff"; break;
        case "bold_colorido": if (!hasImage) portadaBg.style.background = "linear-gradient(135deg, #e63946 0%, #1d3557 50%, #111 100%)"; overlay.style.background = "rgba(0,0,0,0.3)"; nombre.style.color = "#f1faee"; mesa.style.color = "rgba(241,250,238,0.7)"; btn.style.borderColor = "rgba(241,250,238,0.5)"; btn.style.color = "#f1faee"; break;
        case "glassmorphism": if (!hasImage) portadaBg.style.background = "linear-gradient(135deg, #667eea 0%, #764ba2 50%, #0f3460 100%)"; overlay.style.background = "rgba(0,0,0,0.2)"; nombre.style.color = "#ffffff"; mesa.style.color = "rgba(255,255,255,0.7)"; btn.style.borderColor = "rgba(255,255,255,0.4)"; btn.style.color = "#ffffff"; break;
        case "rustico": if (!hasImage) portadaBg.style.background = "linear-gradient(180deg, #3e2723 0%, #5d4037 50%, #2c1a12 100%)"; overlay.style.background = "rgba(0,0,0,0.3)"; nombre.style.color = "#f5f0e8"; mesa.style.color = "rgba(245,240,238,0.6)"; btn.style.borderColor = "rgba(245,240,238,0.4)"; btn.style.color = "#f5f0e8"; break;
    }
}

async function init() {
    if (!mesaToken || !empresaId) {
        document.getElementById("mainContent").innerHTML = '<div class="empty" style="padding-top:80px"><p>QR invalido. Pedile a un camarero.</p></div>';
        return;
    }
    try {
        const [empRes, mesaRes, prodRes] = await Promise.all([
            sb.from("empresas").select("id,nombre,carta_template,logo_url,foto_url,portada_url").eq("id", empresaId).single(),
            sb.from("mesas").select("*").eq("mesa_token", mesaToken).single(),
            sb.from("productos_empresa").select("*").eq("empresa_id", empresaId).eq("activo", true).order("categoria")
        ]);
        empresaData = empRes.data;
        mesaData = mesaRes.data;
        productos = prodRes.data || [];
        if (!empresaData || !mesaData) {
            document.getElementById("mainContent").innerHTML = '<div class="empty" style="padding-top:80px"><p>Mesa no encontrada</p></div>';
            return;
        }
        applyTheme(empresaData.carta_template || "dark_elegance");
        document.getElementById("portadaNombre").textContent = empresaData.nombre;
        document.getElementById("portadaMesa").textContent = `Mesa #${mesaData.numero}`;
        if (empresaData.logo_url) {
            const logo = document.getElementById("portadaLogo");
            logo.src = empresaData.logo_url;
            logo.style.display = "block";
        }
        applyPortadaTheme(empresaData.carta_template || "dark_elegance");
        if (empresaData.portada_url) {
            document.getElementById("portadaBg").style.backgroundImage = `url(${empresaData.portada_url})`;
        }
        sb.from("mesas").update({ estado: "ocupada" }).eq("id", mesaData.id).then(() => {});
        renderProductos();
    } catch (e) {
        document.getElementById("mainContent").innerHTML = '<div class="empty" style="padding-top:80px"><p>Error cargando carta</p></div>';
    }
}

function renderProductos(filtro) {
    let filtrados = productos;
    if (filtro) filtrados = productos.filter(p => p.categoria === filtro);
    const cats = [...new Set(productos.map(p => p.categoria).filter(Boolean))];
    document.getElementById("categoriasBar").innerHTML = `
        <button class="cat-btn ${!filtro ? 'active' : ''}" onclick="renderProductos()">Todos</button>
        ${cats.map(c => `<button class="cat-btn ${filtro === c ? 'active' : ''}" onclick="renderProductos('${c}')">${c}</button>`).join("")}`;
    if (filtrados.length === 0) {
        document.getElementById("mainContent").innerHTML = '<div class="empty"><p>Sin productos disponibles</p></div>';
        return;
    }
    const css = getComputedStyle(document.documentElement);
    let html = filtrados.map(p => {
        const enCarrito = carrito.find(c => c.id === p.id);
        const qty = enCarrito ? enCarrito.qty : 0;
        return `<div class="producto-card">
            ${p.foto_url ? `<img src="${p.foto_url}" class="producto-img">` : `<div class="producto-img"></div>`}
            <div class="producto-info">
                <div class="producto-nombre">${p.nombre}</div>
                ${p.descripcion ? `<div class="producto-desc">${p.descripcion}</div>` : ""}
                <div style="display:flex;align-items:center;gap:4px">
                    ${p.precio_oferta ? `<span class="precio-original">$${p.precio.toFixed(0)}</span>` : ""}
                    <span class="producto-precio" style="color:${css.getPropertyValue('--price').trim()}">$${(p.precio_oferta || p.precio).toFixed(0)}</span>
                </div>
                <div class="producto-add">
                    ${qty > 0 ? `<button class="qty-btn" onclick="changeQty('${p.id}',-1)">-</button>
                    <span class="qty-num">${qty}</span>
                    <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>` :
                    `<button class="add-btn" onclick="addToCart('${p.id}')">+ Agregar</button>`}
                </div>
            </div>
        </div>`;
    }).join("");
    document.getElementById("mainContent").innerHTML = html;
    updateCarritoBar();
}

function addToCart(prodId) {
    const prod = productos.find(p => p.id === prodId);
    if (!prod) return;
    const existing = carrito.find(c => c.id === prodId);
    if (existing) { existing.qty++; }
    else { carrito.push({ id: prod.id, nombre: prod.nombre, precio: prod.precio_oferta || prod.precio, qty: 1 }); }
    renderProductos(document.querySelector(".cat-btn.active")?.textContent === "Todos" ? null : document.querySelector(".cat-btn.active")?.textContent);
}

function changeQty(prodId, delta) {
    const item = carrito.find(c => c.id === prodId);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) carrito = carrito.filter(c => c.id !== prodId);
    renderProductos(document.querySelector(".cat-btn.active")?.textContent === "Todos" ? null : document.querySelector(".cat-btn.active")?.textContent);
}

function updateCarritoBar() {
    const totalItems = carrito.reduce((s, c) => s + c.qty, 0);
    const totalPrecio = carrito.reduce((s, c) => s + c.precio * c.qty, 0);
    document.getElementById("carritoCount").textContent = totalItems + " items";
    document.getElementById("carritoTotal").textContent = "$" + totalPrecio.toFixed(0);
    document.getElementById("btnPedir").disabled = totalItems === 0;
    document.getElementById("carritoBar").style.display = totalItems > 0 ? "" : "none";
}

function showNombreInput() {
    document.getElementById("nombreInput").classList.add("show");
    document.getElementById("clienteNombre").focus();
}

function hideNombreInput() {
    document.getElementById("nombreInput").classList.remove("show");
}

async function confirmarPedido() {
    const nombre = document.getElementById("clienteNombre").value.trim() || "Cliente";
    hideNombreInput();
    const total = carrito.reduce((s, c) => s + c.precio * c.qty, 0);
    try {
        await sb.from("pedidos").insert({
            empresa_id: empresaId,
            mesa_token: mesaToken,
            cliente_nombre: nombre,
            cliente_token: clienteToken,
            items: JSON.stringify(carrito.map(c => ({ nombre: c.nombre, cantidad: c.qty, precio: c.precio }))),
            total: total,
            estado: "recibido",
            tipo_entrega: "Mesa",
            notas: `Mesa #${mesaData.numero} - ${nombre}`
        });
        carrito = [];
        updateCarritoBar();
        document.getElementById("pedidoIdDisplay").textContent = `Pedido de ${nombre}`;
        document.getElementById("estadoPedido").classList.add("show");
    } catch (e) {
        alert("Error: " + e.message);
    }
}

function volverCarta() {
    document.getElementById("estadoPedido").classList.remove("show");
    renderProductos(document.querySelector(".cat-btn.active")?.textContent === "Todos" ? null : document.querySelector(".cat-btn.active")?.textContent);
}

init();
</script>
</body>
