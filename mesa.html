<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carta - UrbanFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
            --border: #30363d; --text: #c9d1d9; --text2: #8b949e;
            --accent: #58a6ff; --accent2: #1f6feb; --price: #7ee787;
            --success: #238636; --danger: #da3633; --muted: #484f58;
            --font: 'Inter', 'Segoe UI', sans-serif; --font-heading: 'Inter', sans-serif;
            --card-radius: 10px; --card-shadow: none;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { font-family: var(--font); color: var(--text); height: 100%; overflow: hidden; }
        body { background: var(--bg); }
        .app-layout { display: flex; flex-direction: column; height: 100vh; }
        .categorias { position: sticky; top: 0; z-index: 10; display: flex; gap: 8px; overflow-x: auto; padding: 12px 12px 8px; -webkit-overflow-scrolling: touch; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .cat-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; white-space: nowrap; flex-shrink: 0; font-family: var(--font); }
        .cat-btn.active { background: var(--accent2); color: white; border-color: var(--accent2); }
        .productos-scroll { flex: 1; overflow-y: auto; padding: 12px 12px 80px; -webkit-overflow-scrolling: touch; padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }
        .producto-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 12px; margin-bottom: 10px; display: flex; gap: 12px; box-shadow: var(--card-shadow); }
        .producto-img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; background: var(--bg3); flex-shrink: 0; }
        .producto-info { flex: 1; min-width: 0; }
        .producto-nombre { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
        .producto-desc { color: var(--text2); font-size: 12px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .producto-precio { font-weight: bold; color: var(--price); font-size: 16px; }
        .producto-add { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
        .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-btn:active { background: var(--accent2); border-color: var(--accent2); }
        .qty-num { font-size: 16px; font-weight: bold; min-width: 20px; text-align: center; }
        .add-btn { background: var(--accent2); color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: var(--font); }
        .add-btn:active { opacity: 0.8; }
        .carrito-bar { background: var(--bg2); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .carrito-bar .items-count { color: var(--text2); font-size: 14px; }
        .carrito-bar .total { font-weight: bold; color: var(--price); font-size: 18px; }
        .carrito-btn { background: var(--success); color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: var(--font); }
        .carrito-btn:disabled { background: var(--bg3); color: var(--muted); cursor: not-allowed; }
        .carrito-btn:active:not(:disabled) { opacity: 0.8; }
        .estado-pedido { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); z-index: 300; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 24px; }
        .estado-pedido.show { display: flex; }
        .estado-pedido .icon { font-size: 64px; margin-bottom: 16px; }
        .estado-pedido h2 { color: var(--accent); margin-bottom: 8px; }
        .estado-pedido p { color: var(--text2); font-size: 14px; line-height: 1.6; }
        .estado-pedido .volver { margin-top: 24px; background: var(--bg3); color: var(--text); border: none; border-radius: 8px; padding: 10px 24px; cursor: pointer; font-size: 14px; font-family: var(--font); }
        .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
        .precio-original { text-decoration: line-through; color: var(--muted); font-size: 12px; margin-right: 4px; }

        /* ===== PORTADA ===== */
        .portada { display: none; position: fixed; inset: 0; z-index: 500; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .portada.show { display: flex; }
        .portada-bg-layer { position: absolute; inset: 0; }
        .portada-content { position: relative; z-index: 2; text-align: center; padding: 32px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .portada-footer { position: absolute; bottom: 16px; left: 0; right: 0; text-align: center; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.2; z-index: 2; }

        /* Animaciones */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes expandH { from { width: 0; } to { width: 80px; } }
        @keyframes expandW { from { width: 0; } to { width: 160px; } }
        @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="portada show" id="portada">
    <div class="portada-bg-layer" id="portadaBgLayer"></div>
    <div class="portada-content" id="portadaContent"></div>
    <div class="portada-footer" id="portadaFooter" style="color:rgba(255,255,255,0.3)">Powered by UrbanFlow</div>
</div>

<div class="app-layout">
    <div class="categorias" id="categoriasBar"></div>
    <div class="productos-scroll" id="mainContent">
        <div class="empty" style="padding-top:80px"><p>Cargando carta...</p></div>
    </div>
    <div class="carrito-bar" id="carritoBar" style="display:none">
        <div>
            <div class="items-count" id="carritoCount">0 items</div>
            <div class="total" id="carritoTotal">$0</div>
        </div>
        <button class="carrito-btn" id="btnPedir" disabled onclick="enviarPedido()">Pedir</button>
    </div>
</div>

<div class="estado-pedido" id="estadoPedido">
    <div class="icon">👨‍🍳</div>
    <h2>Tu eleccion ya esta en manos de nuestra cocina</h2>
    <p>Pronto te la llevaran a la mesa.</p>
    <p id="pedidoIdDisplay" style="color:var(--accent);margin-top:12px;font-size:12px"></p>
    <div style="margin-top:24px;display:flex;gap:12px">
        <button class="volver" onclick="volverCarta()">Volver a la carta</button>
        <button class="volver" onclick="showRating()" style="background:var(--accent2);color:white">Calificar ⭐</button>
    </div>
</div>

<div class="estado-pedido" id="ratingModal" style="display:none;overflow-y:auto;align-items:flex-start;padding-top:40px">
    <div style="font-size:48px;margin-bottom:8px">⭐</div>
    <h2 style="margin-bottom:4px">Califica tu experiencia</h2>
    <p style="color:var(--text2);margin-bottom:16px;font-size:13px">Toca las estrellas de cada categoria</p>
    
    <div id="ratingCategories" style="width:100%;max-width:320px;margin-bottom:20px"></div>
    
    <div style="margin-bottom:16px">
        <div style="font-size:28px;font-weight:bold;color:var(--accent)" id="ratingAvg">0.0</div>
        <div style="font-size:12px;color:var(--text2)">Promedio general</div>
    </div>

    <div style="display:flex;gap:12px">
        <button class="volver" onclick="closeRating()">Ahora no</button>
        <button class="volver" onclick="sendRating()" style="background:var(--accent2);color:white">Enviar</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

                <div style="width:2px;height:40px;background:linear-gradient(to bottom,transparent,rgba(139,69,19,0.6),transparent);margin-bottom:24px;animation:fadeIn 0.6s ease 0.1s both"></div>
                <div style="font-family:'Playfair Display',serif;font-size:11px;letter-spacing:8px;text-transform:uppercase;color:rgba(139,69,19,0.8);margin-bottom:20px;animation:fadeIn 0.6s ease 0.3s both">~ desde 1987 ~</div>
                ${logoUrl ? `<img src="${logoUrl}" style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid rgba(139,69,19,0.4);margin-bottom:20px;animation:scaleIn 0.8s ease 0.4s both">` :
                `<div style="width:90px;height:90px;border-radius:50%;border:3px solid rgba(139,69,19,0.4);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:30px;color:${this.color};margin-bottom:20px;animation:scaleIn 0.8s ease 0.4s both">${initials}</div>`}
                <div style="font-family:'Playfair Display',serif;font-size:32px;color:${this.color};line-height:1.1;margin-bottom:6px;animation:fadeUp 0.8s ease 0.6s both">${nombre}</div>
                <div style="font-family:'Lora',serif;font-size:11px;color:rgba(139,69,19,0.7);letter-spacing:6px;text-transform:uppercase;margin-bottom:28px;animation:fadeIn 0.6s ease 1s both">bienvenidos</div>
                <div style="font-family:'Lora',serif;font-size:12px;color:${this.subColor};letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;animation:fadeIn 0.6s ease 1.1s both">Mesa ${mesa}</div>
                <div style="font-family:'Lora',serif;font-size:13px;color:${this.instructColor};max-width:260px;line-height:1.7;margin-bottom:28px;animation:fadeIn 0.6s ease 1.3s both;font-style:italic">${INSTRUCCION}</div>
                <button onclick="entrarCarta()" style="border:1px solid rgba(139,69,19,0.5);background:rgba(139,69,19,0.15);color:${this.color};padding:14px 48px;font-family:'Playfair Display',serif;font-size:14px;letter-spacing:4px;text-transform:uppercase;cursor:pointer;animation:fadeUp 0.8s ease 1.5s both">Entrar</button>
                <div style="width:2px;height:30px;background:linear-gradient(to bottom,rgba(139,69,19,0.6),transparent);margin-top:24px;animation:fadeIn 0.6s ease 1.7s both"></div>`;
        }
    }
};

function applyTheme(templateId) {
    const themeConfigs = {
        dark_elegance: { bg: "#0a0a0a", bg2: "#141414", bg3: "#1e1e1e", border: "#2a2a2a", text: "#e8e8e8", text2: "#999", accent: "#d4af37", accent2: "#b8960c", price: "#d4af37", success: "#2d8a4e", danger: "#c0392b", muted: "#555", font: "'Inter', sans-serif", cardRadius: "12px", cardShadow: "0 4px 20px rgba(0,0,0,0.4)" },
        editorial: { bg: "#faf6ee", bg2: "#f0ebe0", bg3: "#e6dfd2", border: "#d4c9b5", text: "#1a1612", text2: "#6b5e4f", accent: "#6b1d1d", accent2: "#8b2500", price: "#6b1d1d", success: "#2d6a3f", danger: "#991b1b", muted: "#9a8b7a", font: "'Lora', serif", cardRadius: "8px", cardShadow: "0 2px 8px rgba(0,0,0,0.08)" },
        minimalista: { bg: "#ffffff", bg2: "#ffffff", bg3: "#f5f5f5", border: "#e5e5e5", text: "#171717", text2: "#737373", accent: "#000000", accent2: "#171717", price: "#171717", success: "#16a34a", danger: "#dc2626", muted: "#a3a3a3", font: "'Inter', sans-serif", cardRadius: "6px", cardShadow: "none" },
        bold_colorido: { bg: "#111111", bg2: "#1a1a2e", bg3: "#16213e", border: "#0f3460", text: "#f1faee", text2: "#a8dadc", accent: "#e63946", accent2: "#d62828", price: "#f77f00", success: "#2d6a4f", danger: "#e63946", muted: "#457b9d", font: "'Inter', sans-serif", cardRadius: "14px", cardShadow: "0 4px 24px rgba(230,57,70,0.15)" },
        glassmorphism: { bg: "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)", bg2: "rgba(255,255,255,0.08)", bg3: "rgba(255,255,255,0.05)", border: "rgba(255,255,255,0.12)", text: "#e0e0ff", text2: "rgba(255,255,255,0.6)", accent: "#a78bfa", accent2: "#7c3aed", price: "#34d399", success: "#10b981", danger: "#f87171", muted: "rgba(255,255,255,0.3)", font: "'Inter', sans-serif", cardRadius: "16px", cardShadow: "0 8px 32px rgba(0,0,0,0.3)" },
        rustico: { bg: "#f5f0e8", bg2: "#efe8db", bg3: "#e6ddd0", border: "#d4c5a9", text: "#3e2723", text2: "#6d4c41", accent: "#8b4513", accent2: "#a0522d", price: "#8b4513", success: "#556b2f", danger: "#b22222", muted: "#8d7b68", font: "'Lora', serif", cardRadius: "6px", cardShadow: "0 2px 12px rgba(62,39,35,0.1)" }
    };
    const t = themeConfigs[templateId] || themeConfigs.dark_elegance;
    const r = document.documentElement.style;
    r.setProperty("--bg", t.bg); r.setProperty("--bg2", t.bg2); r.setProperty("--bg3", t.bg3);
    r.setProperty("--border", t.border); r.setProperty("--text", t.text); r.setProperty("--text2", t.text2);
    r.setProperty("--accent", t.accent); r.setProperty("--accent2", t.accent2); r.setProperty("--price", t.price);
    r.setProperty("--success", t.success); r.setProperty("--danger", t.danger); r.setProperty("--muted", t.muted);
    r.setProperty("--font", t.font); r.setProperty("--card-radius", t.cardRadius); r.setProperty("--card-shadow", t.cardShadow);
    document.body.style.background = t.bg;
    document.body.style.fontFamily = t.font;
}

function entrarCarta() {
    const portada = document.getElementById("portada");
    portada.style.transition = "opacity 0.4s ease";
    portada.style.opacity = "0";
    setTimeout(() => { portada.classList.remove("show"); portada.style.opacity = ""; portada.style.transition = ""; }, 400);
}

async function init() {
    if (!mesaToken || !empresaId) {
        document.getElementById("mainContent").innerHTML = '<div class="empty" style="padding-top:80px"><p>QR invalido. Pedile a un camarero.</p></div>';
        return;
    }
    try {
        const [empRes, mesaRes, prodRes, ratRes] = await Promise.all([
            sb.from("empresas").select("id,nombre,carta_template,logo_url").eq("id", empresaId).single(),
            sb.from("mesas").select("*").eq("mesa_token", mesaToken).single(),
            sb.from("productos_empresa").select("*").eq("empresa_id", empresaId).eq("activo", true).order("categoria"),
            sb.from("calificaciones").select("estrellas").eq("empresa_id", empresaId)
        ]);
        empresaData = empRes.data;
        mesaData = mesaRes.data;
        productos = prodRes.data || [];
        const ratings = ratRes.data || [];
        empresaData._avgRating = ratings.length > 0 ? (ratings.reduce((s, r) => s + r.estrellas, 0) / ratings.length).toFixed(1) : null;
        empresaData._totalRatings = ratings.length;
        if (!empresaData || !mesaData) {
            document.getElementById("mainContent").innerHTML = '<div class="empty" style="padding-top:80px"><p>Mesa no encontrada</p></div>';
            return;
        }
        const tpl = empresaData.carta_template || "dark_elegance";
        applyTheme(tpl);

        const p = portadas[tpl] || portadas.dark_elegance;
        document.getElementById("portadaBgLayer").style.background = p.bg;
        document.getElementById("portadaFooter").style.color = p.footerColor;
        document.getElementById("portada").style.background = p.bg;
        document.body.style.background = p.bg;

        const initials = empresaData.nombre.split(" ").map(w => w[0]).join("").substring(0, 2).toUpperCase();
        p.render(document.getElementById("portadaContent"), empresaData.nombre, mesaData.numero, empresaData.logo_url, initials);

        if (empresaData._avgRating) {
            const stars = "★".repeat(Math.round(empresaData._avgRating)) + "☆".repeat(5 - Math.round(empresaData._avgRating));
            const ratingHtml = `<div style="margin-top:12px;animation:fadeIn 0.6s ease 1.4s both">
                <span style="color:${p.color};font-size:16px;letter-spacing:2px">${stars}</span>
                <span style="color:${p.subColor};font-size:12px;margin-left:6px">${empresaData._avgRating} (${empresaData._totalRatings})</span>
            </div>`;
            document.getElementById("portadaContent").insertAdjacentHTML("beforeend", ratingHtml);
        }

        sb.from("mesas").update({ estado: "ocupada" }).eq("id", mesaData.id).then(() => {});
        renderProductos();
    } catch (e) {
        document.getElementById("mainContent").innerHTML = '<div class="empty" style="padding-top:80px"><p>Error cargando carta</p></div>';
    }
}

const ALL_CATS = [
    { id: "Menu", label: "Menu", icon: "📋" },
    { id: "Recomendados", label: "Recomendados", icon: "⭐" },
    { id: "Promociones", label: "Promociones", icon: "🔥" },
    { id: "Frankfurters y Hungaras", label: "Frankfurters y Hungaras", icon: "🌭" },
    { id: "Chivitos", label: "Chivitos", icon: "🥩" },
    { id: "Sandwiches frios", label: "Sandwiches frios", icon: "🥪" },
    { id: "Sandwiches calientes", label: "Sandwiches calientes", icon: "🌯" },
    { id: "Pizzetas", label: "Pizzetas", icon: "🍕" },
    { id: "Entradas", label: "Entradas", icon: "🥗" },
    { id: "Carnes", label: "Carnes", icon: "🥩" },
    { id: "Pescados", label: "Pescados", icon: "🐟" },
    { id: "Pollos", label: "Pollos", icon: "🍗" },
    { id: "Pastas artesanales", label: "Pastas artesanales", icon: "🍝" },
    { id: "Ensaladas especiales", label: "Ensaladas especiales", icon: "🥙" },
    { id: "Ensaladas", label: "Ensaladas", icon: "🥗" },
    { id: "Milanesas", label: "Milanesas", icon: "🍖" },
    { id: "Hamburguesas", label: "Hamburguesas", icon: "🍔" },
    { id: "Omelettes", label: "Omelettes", icon: "🍳" },
    { id: "Pizzeria", label: "Pizzeria", icon: "🍕" },
    { id: "Postres", label: "Postres", icon: "🍰" },
    { id: "Bebidas", label: "Bebidas", icon: "🥤" }
];

function renderProductos(filtro) {
    let filtrados = productos;
    if (filtro) filtrados = productos.filter(p => p.categoria === filtro);
    const catsWithProducts = [...new Set(productos.map(p => p.categoria).filter(Boolean))];
    const visibleCats = ALL_CATS.filter(c => catsWithProducts.includes(c.id));
    document.getElementById("categoriasBar").innerHTML = `
        <button class="cat-btn ${!filtro ? 'active' : ''}" onclick="renderProductos()">Todos</button>
        ${visibleCats.map(c => `<button class="cat-btn ${filtro === c.id ? 'active' : ''}" onclick="renderProductos('${c.id}')">${c.icon} ${c.label}</button>`).join("")}`;
    if (filtrados.length === 0) {
        document.getElementById("mainContent").innerHTML = '<div class="empty"><p>Sin productos disponibles</p></div>';
        return;
    }
    let html = filtrados.map(p => {
        const enCarrito = carrito.find(c => c.id === p.id);
        const qty = enCarrito ? enCarrito.qty : 0;
        return `<div class="producto-card">
            ${p.foto_url ? `<img src="${p.foto_url}" class="producto-img">` : `<div class="producto-img"></div>`}
            <div class="producto-info">
                <div class="producto-nombre">${p.nombre}</div>
                ${p.descripcion ? `<div class="producto-desc">${p.descripcion}</div>` : ""}
                <div style="display:flex;align-items:center;gap:4px">
                    ${p.precio_oferta ? `<span class="precio-original">$${p.precio.toFixed(0)}</span>` : ""}
                    <span class="producto-precio">$${(p.precio_oferta || p.precio).toFixed(0)}</span>
                </div>
                <div class="producto-add">
                    ${qty > 0 ? `<button class="qty-btn" onclick="changeQty('${p.id}',-1)">-</button>
                    <span class="qty-num">${qty}</span>
                    <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>` :
                    `<button class="add-btn" onclick="addToCart('${p.id}')">+ Agregar</button>`}
                </div>
            </div>
        </div>`;
    }).join("");
    document.getElementById("mainContent").innerHTML = html;
    updateCarritoBar();
}

function addToCart(prodId) {
    const prod = productos.find(p => p.id === prodId);
    if (!prod) return;
    const existing = carrito.find(c => c.id === prodId);
    if (existing) { existing.qty++; }
    else { carrito.push({ id: prod.id, nombre: prod.nombre, precio: prod.precio_oferta || prod.precio, qty: 1 }); }
    renderProductos(document.querySelector(".cat-btn.active")?.textContent === "Todos" ? null : document.querySelector(".cat-btn.active")?.textContent);
}

function changeQty(prodId, delta) {
    const item = carrito.find(c => c.id === prodId);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) carrito = carrito.filter(c => c.id !== prodId);
    renderProductos(document.querySelector(".cat-btn.active")?.textContent === "Todos" ? null : document.querySelector(".cat-btn.active")?.textContent);
}

function updateCarritoBar() {
    const totalItems = carrito.reduce((s, c) => s + c.qty, 0);
    const totalPrecio = carrito.reduce((s, c) => s + c.precio * c.qty, 0);
    document.getElementById("carritoCount").textContent = totalItems + " items";
    document.getElementById("carritoTotal").textContent = "$" + totalPrecio.toFixed(0);
    document.getElementById("btnPedir").disabled = totalItems === 0;
    document.getElementById("carritoBar").style.display = totalItems > 0 ? "" : "none";
}

async function enviarPedido() {
    const total = carrito.reduce((s, c) => s + c.precio * c.qty, 0);
    try {
        await sb.from("pedidos").insert({
            empresa_id: empresaId,
            mesa_token: mesaToken,
            cliente_nombre: "Cliente Mesa " + mesaData.numero,
            cliente_token: clienteToken,
            items: JSON.stringify(carrito.map(c => ({ nombre: c.nombre, cantidad: c.qty, precio: c.precio }))),
            total: total,
            estado: "recibido",
            tipo_entrega: "Mesa",
            notas: `Mesa #${mesaData.numero}`
        });
        carrito = [];
        updateCarritoBar();
        document.getElementById("estadoPedido").classList.add("show");
    } catch (e) {
        alert("Error: " + e.message);
    }
}

function volverCarta() {
    document.getElementById("estadoPedido").classList.remove("show");
    renderProductos(document.querySelector(".cat-btn.active")?.textContent === "Todos" ? null : document.querySelector(".cat-btn.active")?.textContent);
}

const RATING_CATS = [
    { id: "servicio", label: "Servicio", icon: "👋" },
    { id: "comida", label: "Comida", icon: "🍽️" },
    { id: "rapidez", label: "Rapidez", icon: "⚡" },
    { id: "ambiente", label: "Ambiente", icon: "🎵" },
    { id: "precio", label: "Precio", icon: "💰" }
];

let ratings = {};

function setStar(catId, n) {
    ratings[catId] = n;
    const stars = document.querySelectorAll(`.star-${catId}`);
    stars.forEach((s, i) => {
        s.style.opacity = i < n ? "1" : "0.25";
        s.style.color = i < n ? "#f5a623" : "inherit";
    });
    const commentInput = document.getElementById(`comment-${catId}`);
    if (commentInput) commentInput.style.display = n > 0 ? "block" : "none";
    updateAvg();
}

function updateAvg() {
    const vals = RATING_CATS.map(c => ratings[c.id] || 0).filter(v => v > 0);
    if (vals.length === 0) {
        document.getElementById("ratingAvg").textContent = "0.0";
        return;
    }
    const avg = (vals.reduce((s, v) => s + v, 0) / vals.length).toFixed(1);
    document.getElementById("ratingAvg").textContent = avg + " / 5.0";
}

function showRating() {
    document.getElementById("estadoPedido").classList.remove("show");
    document.getElementById("ratingModal").style.display = "flex";
    ratings = {};
    const container = document.getElementById("ratingCategories");
    container.innerHTML = RATING_CATS.map(c => `
        <div style="padding:10px 0;border-bottom:1px solid var(--border)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                <span style="font-size:14px;color:var(--text)">${c.icon} ${c.label}</span>
                <div style="display:flex;gap:4px">
                    ${[1,2,3,4,5].map(n => `<span class="star-${c.id}" onclick="setStar('${c.id}',${n})" style="font-size:26px;cursor:pointer;opacity:0.25;transition:all 0.15s">★</span>`).join("")}
                </div>
            </div>
            <input type="text" id="comment-${c.id}" placeholder="Comentario opcional..." style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--text);font-size:12px;font-family:var(--font);display:none;margin-top:6px">
        </div>
    `).join("");
    document.getElementById("ratingAvg").textContent = "0.0 / 5.0";
}

function closeRating() {
    document.getElementById("ratingModal").style.display = "none";
    volverCarta();
}

async function sendRating() {
    const vals = RATING_CATS.map(c => ratings[c.id] || 0);
    if (vals.every(v => v === 0)) { alert("Toca al menos una estrella"); return; }
    const avg = vals.filter(v => v > 0).reduce((s, v) => s + v, 0) / vals.filter(v => v > 0).length;
    try {
        const comments = {};
        RATING_CATS.forEach(c => {
            const input = document.getElementById(`comment-${c.id}`);
            if (input && input.value.trim()) comments[c.id] = input.value.trim();
        });
        await sb.from("calificaciones").insert({
            empresa_id: empresaId,
            mesa_token: mesaToken,
            cliente_token: clienteToken,
            estrellas: Math.round(avg),
            servicio: ratings.servicio || null,
            comida: ratings.comida || null,
            rapidez: ratings.rapidez || null,
            ambiente: ratings.ambiente || null,
            precio: ratings.precio || null,
            comentario: Object.keys(comments).length > 0 ? JSON.stringify(comments) : null
        });
        document.getElementById("ratingModal").style.display = "none";
        alert("Gracias por tu calificacion!");
        volverCarta();
    } catch (e) {
        console.error("Error rating:", e);
        volverCarta();
    }
}

init();
</script>
