<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delivery - UrbanFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
        .header { background: #161b22; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 16px; color: #58a6ff; }
        .header .rest-name { color: #8b949e; font-size: 12px; }
        .container { padding: 12px; max-width: 600px; margin: 0 auto; padding-bottom: 80px; }
        .pedido-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .pedido-card.nuevo { border-color: #f0883e; animation: glow 1.5s infinite; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px rgba(240,136,62,0.3); } 50% { box-shadow: 0 0 20px rgba(240,136,62,0.6); } }
        .pedido-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .pedido-id { font-weight: bold; color: #58a6ff; font-size: 16px; }
        .pedido-estado { padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .estado-listo { background: #238636; color: #7ee787; }
        .estado-en_camino { background: #9e6a03; color: #f0e68c; }
        .estado-entregado { background: #1f6feb; color: #a5d6ff; }
        .pedido-info { color: #8b949e; font-size: 13px; margin-bottom: 10px; line-height: 1.6; }
        .pedido-items { font-size: 14px; color: #c9d1d9; margin-bottom: 10px; font-weight: 500; }
        .pedido-direccion { background: #0d1117; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; font-size: 13px; border-left: 3px solid #58a6ff; }
        .pedido-secreta { background: #1a1e2e; border: 2px dashed #f0883e; border-radius: 8px; padding: 12px; margin-bottom: 10px; text-align: center; }
        .pedido-secreta .label { color: #f0883e; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }
        .pedido-secreta .palabra { font-size: 22px; font-weight: bold; color: #f0e68c; letter-spacing: 3px; }
        .pedido-total { font-size: 18px; font-weight: bold; color: #7ee787; margin: 8px 0; }
        .pedido-actions { display: flex; gap: 8px; margin-top: 8px; }
        .btn { padding: 12px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; flex: 1; text-align: center; }
        .btn:active { opacity: 0.8; transform: scale(0.98); }
        .btn-aceptar { background: #238636; color: white; }
        .btn-navegar { background: #1f6feb; color: white; }
        .btn-entregar { background: #f0883e; color: white; }
        .btn-cancelar { background: #da3633; color: white; flex: 0.5; }
        .empty { text-align: center; padding: 60px 20px; color: #484f58; }
        .status-bar { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-on { background: #238636; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #loginSection { max-width: 400px; margin: 60px auto; padding: 0 16px; }
        #loginSection h2 { color: #58a6ff; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; color: #8b949e; font-size: 12px; margin-bottom: 4px; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 16px; text-align: center; letter-spacing: 8px; }
        .form-group input:focus { border-color: #58a6ff; outline: none; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
        .btn-primary { background: #1f6feb; color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: 600; }
        .btn-cerrar { background: #da3633; color: white; padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; width: 90%; max-width: 360px; text-align: center; }
        .modal h3 { color: #f0883e; margin-bottom: 16px; font-size: 18px; }
        .modal-input { width: 100%; padding: 14px; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; color: #f0e68c; font-size: 20px; text-align: center; letter-spacing: 4px; text-transform: uppercase; font-weight: bold; }
        .modal-input:focus { border-color: #f0883e; outline: none; }
        .modal-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 12px; }
        .modal-btn-confirm { background: #238636; color: white; }
        .modal-btn-cancel { background: #30363d; color: #8b949e; }
        .modal-error { color: #da3633; font-size: 13px; margin-top: 8px; display: none; }
        .modal-ok { color: #7ee787; font-size: 14px; margin-top: 12px; display: none; }
    </style>
</head>
<body>

<div id="loginSection">
    <h2>Delivery</h2>
    <div class="card">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="tu@email.com" style="text-align:left;letter-spacing:normal">
        </div>
        <div class="form-group">
            <label>Contrasena (PIN)</label>
            <input type="password" id="pinInput" maxlength="6" placeholder="****" inputmode="numeric">
        </div>
        <button class="btn-primary" onclick="loginPin()">Entrar</button>
        <p id="loginError" style="color:#da3633;text-align:center;margin-top:12px;display:none"></p>
    </div>
</div>

<div id="deliverySection" style="display:none">
    <div class="header">
        <div>
            <h1 id="deliveryName">Delivery</h1>
            <span class="rest-name" id="restInfo"></span>
        </div>
        <button class="btn-cerrar" onclick="logout()">Salir</button>
    </div>
    <div class="container">
        <div class="status-bar">
            <span class="dot dot-on"></span>
            <span>Conectado</span>
            <span style="flex:1"></span>
            <span style="color:#8b949e;font-size:12px" id="pedidoCount">0 pedidos</span>
        </div>
        <div id="pedidosContainer">
            <div class="empty">Cargando pedidos...</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalEntrega">
    <div class="modal">
        <h3>Pedido #<span id="modalPedidoId"></span></h3>
        <p style="color:#8b949e;font-size:13px;margin-bottom:12px">Pedile la palabra secreta al cliente</p>
        <input type="text" class="modal-input" id="inputSecreta" placeholder="Palabra secreta" maxlength="20" autocomplete="off">
        <p class="modal-error" id="modalError">Palabra incorrecta. Intenta de nuevo.</p>
        <p class="modal-ok" id="modalOk">✅ Entrega confirmada. Cobrando...</p>
        <button class="modal-btn modal-btn-confirm" onclick="confirmarEntrega()">Confirmar Entrega</button>
        <button class="modal-btn modal-btn-cancel" onclick="cerrarModal()">Cancelar</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://eyfgkopaamnkprzpwocz.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5Zmdrb3BhYW1ua3ByenB3b2N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTk0ODMsImV4cCI6MjA5NDE5NTQ4M30.bXkq4Ks3p2yb2SQH76__8jXhmM5Thi2izIL5UPkKa0I";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const params = new URLSearchParams(window.location.search);
let empresaId = params.get("empresa") || "";
let empresaData = null;
let usuarioData = null;
let deliveryNombre = "";
let prevCount = 0;
let pedidoActualId = null;

const notifSound = new Audio("data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgip2+q2EcDjiRtculcBwLH3y6xZ9TEwwfjL3NplkRCx+St8miVhQMG5C3yZ9VEQsdkLjJn1YSDBySt8eYUxEJHZK4yJZQDgcdlLjHlE0NBR2VuMeTTQ0DHpW5xo1KCwEelrjFi0UJAB+XucOIRAEAH5i6wIVB/wAhmbrAfD37ACOausB3OvkAKJy6v3I39wAmnbrAbzPzAC2dub9sMPEAMp25v2kv7wA0nrm9ZSzsADSfub1jKusANJ+5vV8o5wA1n7m9XSbiADafub1bIdoANp+5vVkf1QA3n7m9WR3SADifub1XGs8AOp+5vVcZywA5n7m9VhfIADufub1WFcYAPJ+5vVUUwQA9n7m9VRK7AD6fub1VEbYAP5+5vVMOsgBAn7m9UwuwAEGfub1SCa0AQp+5vVEHqgBDn7m9UAWnAESfub1PA6MARZ+5vU4ApABGn7m9Tf6hAEefub1M/Z8ASJ+5vUv8nQBJn7m9SvubAEqfub1J+pgAS5+5vUj5lgBLn7m9R/eVAEyfub1G9pMATJ+5vUX0kABNn7m9RPKMAE6fub1D8YkAT5+5vULwhwBQn7m9QfCEAFCfub0=");

function playNotif() {
    notifSound.currentTime = 0;
    notifSound.play().catch(() => {});
}

document.getElementById("pinInput").addEventListener("keypress", e => { if (e.key === "Enter") loginPin(); });

async function loginPin() {
    const email = document.getElementById("loginEmail").value.trim().toLowerCase();
    const pin = document.getElementById("pinInput").value.trim();
    if (!email) { showError("Ingresa tu email"); return; }
    if (!pin) { showError("Ingresa tu contrasena"); return; }
    const { data: usuarios } = await sb.from("usuarios_empresa").select("*, empresas(id,nombre)").eq("pin", pin).eq("activo", true);
    if (!usuarios || usuarios.length === 0) { showError("Contrasena incorrecta"); return; }
    const usr = usuarios.find(u => u.email && u.email.toLowerCase() === email) || usuarios[0];
    if (usr.email && usr.email.toLowerCase() !== email) { showError("Email no registrado"); return; }
    if (usr.rol !== "delivery" && usr.rol !== "admin") { showError("Este usuario no es de delivery"); return; }
    empresaId = usr.empresa_id;
    empresaData = usr.empresas;
    usuarioData = usr;
    deliveryNombre = usr.nombre || "Delivery";
    document.getElementById("deliveryName").textContent = deliveryNombre;
    document.getElementById("restInfo").textContent = empresaData?.nombre || "";
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("deliverySection").style.display = "block";
    startDelivery();
}

function showError(msg) {
    const el = document.getElementById("loginError");
    el.textContent = msg;
    el.style.display = "block";
}

function logout() { location.reload(); }

async function startDelivery() {
    loadPedidos();
    setInterval(loadPedidos, 8000);
}

async function loadPedidos() {
    if (!empresaId) return;
    const { data: pedidos } = await sb.from("pedidos").select("*").eq("empresa_id", empresaId)
        .in("estado", ["listo", "en_camino"])
        .order("created_at", { ascending: true });

    const container = document.getElementById("pedidosContainer");
    const pedidosList = pedidos || [];
    document.getElementById("pedidoCount").textContent = pedidosList.length + " pedidos";

    if (pedidosList.length > prevCount && prevCount > 0) playNotif();
    prevCount = pedidosList.length;

    if (pedidosList.length === 0) {
        container.innerHTML = '<div class="empty">Sin pedidos para entregar</div>';
        return;
    }

    container.innerHTML = pedidosList.map(p => {
        const destino = p.direccion_entrega || "";
        const tieneCoords = p.dest_lat && p.dest_lon;
        const fecha = new Date(p.created_at).toLocaleTimeString("es-UY", { hour: "2-digit", minute: "2-digit" });
        let items = [];
        try { items = typeof p.items === "string" ? JSON.parse(p.items) : (p.items || []); } catch(e) {}
        const itemsHtml = items.map(i => `${i.cantidad || 1}x ${i.nombre || i}`).join(", ");
        const esNuevo = p.estado === "listo";

        return `<div class="pedido-card ${esNuevo ? 'nuevo' : ''}">
            <div class="pedido-header">
                <span class="pedido-id">#${p.id.substring(0,8).toUpperCase()}</span>
                <span class="pedido-estado ${p.estado === 'listo' ? 'estado-listo' : 'estado-en_camino'}">${p.estado === 'listo' ? 'LISTO PARA RETIRAR' : 'EN CAMINO'}</span>
            </div>
            <div class="pedido-info">
                ${p.cliente_nombre || "Cliente"} | ${fecha}
            </div>
            <div class="pedido-items">${itemsHtml}</div>
            <div class="pedido-total">$${(p.total || 0).toFixed(0)}</div>
            ${p.palabra_secreta && p.estado === "en_camino" ? `
                <div class="pedido-secreta">
                    <div class="label">Palabra secreta para el cliente</div>
                    <div class="palabra">${p.palabra_secreta}</div>
                </div>
            ` : ""}
            ${destino ? `<div class="pedido-direccion">
                📍 ${destino}
                ${tieneCoords ? `<a href="https://www.google.com/maps/dir/?api=1&destination=${p.dest_lat},${p.dest_lon}" target="_blank" style="color:#58a6ff;font-size:12px;margin-left:8px">🗺️ Navegar</a>` : ""}
            </div>` : ""}
            <div class="pedido-actions">
                ${p.estado === "listo" ? `<button class="btn btn-aceptar" onclick="tomarPedido('${p.id}')">🚴 Tomar Pedido</button>` : ""}
                ${p.estado === "en_camino" ? `
                    ${tieneCoords ? `<button class="btn btn-navegar" onclick="abrirMapa('${p.dest_lat}','${p.dest_lon}')">🗺️ Mapa</button>` : ""}
                    <button class="btn btn-entregar" onclick="abrirModalEntrega('${p.id}')">✅ Entregado</button>
                ` : ""}
            </div>
        </div>`;
    }).join("");
}

async function tomarPedido(id) {
    await sb.from("pedidos").update({ estado: "en_camino", delivery_nombre: deliveryNombre, worker_id: usuarioData?.id }).eq("id", id);
    playNotif();
    loadPedidos();
}

function abrirModalEntrega(id) {
    pedidoActualId = id;
    document.getElementById("modalPedidoId").textContent = id.substring(0,8).toUpperCase();
    document.getElementById("inputSecreta").value = "";
    document.getElementById("modalError").style.display = "none";
    document.getElementById("modalOk").style.display = "none";
    document.getElementById("modalEntrega").classList.add("show");
    document.getElementById("inputSecreta").focus();
}

function cerrarModal() {
    document.getElementById("modalEntrega").classList.remove("show");
    pedidoActualId = null;
}

async function confirmarEntrega() {
    const input = document.getElementById("inputSecreta").value.trim();
    if (!input) return;

    const { data: pedido } = await sb.from("pedidos").select("palabra_secreta").eq("id", pedidoActualId).single();

    if (!pedido || input.toLowerCase() !== (pedido.palabra_secreta || "").toLowerCase()) {
        document.getElementById("modalError").style.display = "block";
        document.getElementById("inputSecreta").value = "";
        document.getElementById("inputSecreta").focus();
        return;
    }

    document.getElementById("modalError").style.display = "none";
    document.getElementById("modalOk").style.display = "block";

    await sb.from("pedidos").update({ estado: "entregado", delivered_at: new Date().toISOString() }).eq("id", pedidoActualId);

    setTimeout(() => {
        cerrarModal();
        loadPedidos();
    }, 1500);
}

function abrirMapa(lat, lon) {
    if (lat && lon) {
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`, "_blank");
    }
}
</script>
</body>
</html>
